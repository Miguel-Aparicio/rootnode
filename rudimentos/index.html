<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Rudimentos · MigueGuay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #080f1a;
      --card:    #0f1e30;
      --card2:   #132337;
      --surface: #172840;
      --accent:  #38bdf8;
      --accent2: #0ea5e9;
      --R:       #f87171;
      --L:       #60a5fa;
      --text:    #e1eaf4;
      --text2:   #94a3b8;
      --muted:   #4d6680;
      --border:  rgba(148,163,184,0.1);
      --border2: rgba(148,163,184,0.2);
      --bronze:  #c97c2e;
      --silver:  #a8bac6;
      --gold:    #f5b820;
      --plat:    #d8e4ee;
      --diamond: #7dd3fc;
      --sidebar: 268px;
      --topbar:  52px;
      --botbar:  60px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100%;
      -webkit-font-smoothing: antialiased;
      opacity: 0;
    }
    body.loaded { animation: fadeIn .35s ease both; }
    body.exit    { animation: fadeOut .28s ease both; pointer-events: none; }
    @keyframes fadeIn  { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
    @keyframes fadeOut { from { opacity:1; } to { opacity:0; } }

    /* ═══════════════════════════════════════
       TOP BAR
    ═══════════════════════════════════════ */
    .top-bar {
      position: sticky; top: 0; z-index: 100;
      height: var(--topbar);
      display: flex; align-items: center; gap: .5rem;
      padding: 0 1.25rem;
      background: rgba(8,15,26,.92);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border-bottom: 1px solid var(--border);
    }
    .top-bar-back {
      display: flex; align-items: center; gap: .35rem;
      color: var(--accent); text-decoration: none;
      font-size: .8rem; font-weight: 500;
      opacity: .75; transition: opacity .15s; flex-shrink: 0;
    }
    .top-bar-back:hover { opacity: 1; }
    .top-bar-sep { color: var(--muted); font-size: .7rem; flex-shrink: 0; }
    .top-bar-title {
      font-size: .88rem; font-weight: 700;
      letter-spacing: -.02em; flex-shrink: 0;
    }
    .top-bar-prog {
      flex: 1; display: flex; align-items: center;
      gap: .5rem; justify-content: flex-end; min-width: 0;
    }
    .prog-pills {
      display: flex; gap: .3rem; flex-wrap: nowrap; overflow: hidden;
    }
    .prog-pill {
      display: flex; align-items: center; gap: .25rem;
      font-size: .68rem; font-weight: 600;
      padding: .15rem .48rem; border-radius: 2rem;
      border: 1px solid transparent; white-space: nowrap; flex-shrink: 0;
    }
    .prog-pill .pp-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .prog-pill.bronze  { color:var(--bronze);  border-color:rgba(201,124,46,.28);  background:rgba(201,124,46,.08);  }
    .prog-pill.silver  { color:var(--silver);  border-color:rgba(168,186,198,.28); background:rgba(168,186,198,.07); }
    .prog-pill.gold    { color:var(--gold);    border-color:rgba(245,184,32,.28);  background:rgba(245,184,32,.08);  }
    .prog-pill.platinum{ color:var(--plat);    border-color:rgba(216,228,238,.22); background:rgba(216,228,238,.06); }
    .prog-pill.diamond { color:var(--diamond); border-color:rgba(125,211,252,.28); background:rgba(125,211,252,.08); }
    .prog-pill.bronze  .pp-dot { background:var(--bronze); }
    .prog-pill.silver  .pp-dot { background:var(--silver); }
    .prog-pill.gold    .pp-dot { background:var(--gold); }
    .prog-pill.platinum .pp-dot { background:var(--plat); }
    .prog-pill.diamond .pp-dot { background:var(--diamond); }
    /* tiny progress bar under topbar */
    .top-prog-bar {
      position: sticky; top: var(--topbar); z-index: 99;
      display: flex; gap: 2px; height: 3px;
    }
    .tpb-seg { flex: 1; background: rgba(255,255,255,.05); }
    .tpb-fill { height: 100%; transition: width .6s cubic-bezier(.4,0,.2,1); }
    .tpb-seg.bronze   .tpb-fill { background: var(--bronze); }
    .tpb-seg.silver   .tpb-fill { background: var(--silver); }
    .tpb-seg.gold     .tpb-fill { background: var(--gold); }
    .tpb-seg.platinum .tpb-fill { background: var(--plat); }
    .tpb-seg.diamond  .tpb-fill { background: var(--diamond); }

    /* ═══════════════════════════════════════
       LAYOUT: two-column on desktop
    ═══════════════════════════════════════ */
    .app-layout {
      display: flex;
      min-height: calc(100vh - var(--topbar) - 3px);
    }

    /* ─── SIDEBAR ─── */
    .sidebar {
      width: var(--sidebar);
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
    }
    .sidebar-inner {
      position: sticky;
      top: calc(var(--topbar) + 3px);
      height: calc(100vh - var(--topbar) - 3px);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    /* view tabs in sidebar */
    .sidebar-tabs {
      display: flex; padding: .75rem .9rem .5rem;
      gap: 3px;
      background: var(--card2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .s-tab {
      flex: 1; padding: .35rem .3rem;
      border-radius: .45rem; border: none;
      background: transparent; color: var(--muted);
      font-family: inherit; font-size: .75rem; font-weight: 500;
      cursor: pointer; transition: all .18s; white-space: nowrap; text-align: center;
    }
    .s-tab.active {
      background: var(--surface); color: var(--text);
      font-weight: 700; box-shadow: 0 1px 4px rgba(0,0,0,.4);
    }
    .s-tab:hover:not(.active) { color: var(--text); background: rgba(255,255,255,.04); }
    /* scrollable list area */
    .sidebar-list {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: .75rem .9rem 1.5rem;
      scrollbar-width: thin; scrollbar-color: var(--border2) transparent;
    }
    .sidebar-list::-webkit-scrollbar { width: 4px; }
    .sidebar-list::-webkit-scrollbar-track { background: transparent; }
    .sidebar-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    /* ─── DETAIL AREA ─── */
    .detail-area {
      flex: 1; min-width: 0;
      padding: 1.5rem 1.75rem 2.5rem;
      overflow-y: auto;
    }

    /* ═══════════════════════════════════════
       CATEGORY TABS
    ═══════════════════════════════════════ */
    .cat-tabs-wrap { margin-bottom: .75rem; }
    .cat-tabs {
      display: flex; gap: .3rem;
      overflow-x: auto; scrollbar-width: none; flex-wrap: wrap;
    }
    .cat-tabs::-webkit-scrollbar { display: none; }
    .cat-tab {
      flex-shrink: 0; padding: .28rem .8rem;
      border-radius: 2rem; border: 1px solid var(--border2);
      background: transparent; color: var(--muted);
      font-family: inherit; font-size: .73rem; font-weight: 500;
      cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .cat-tab.active { background: var(--accent); color: #061422; border-color: var(--accent); font-weight: 700; }
    .cat-tab:hover:not(.active) { color: var(--text); border-color: rgba(56,189,248,.4); background: rgba(56,189,248,.06); }

    /* ═══════════════════════════════════════
       RUDIMENT CHIPS
    ═══════════════════════════════════════ */
    .rud-chips { display: flex; gap: .28rem; flex-wrap: wrap; }
    .rud-chip {
      padding: .28rem .7rem; border-radius: .45rem;
      border: 1px solid var(--border); background: var(--card);
      color: var(--text2); font-family: inherit;
      font-size: .74rem; font-weight: 400; cursor: pointer;
      transition: all .15s; display: flex; align-items: center;
      gap: .28rem; white-space: nowrap;
    }
    .rud-chip.active {
      background: rgba(56,189,248,.12); color: var(--accent);
      border-color: rgba(56,189,248,.35); font-weight: 600;
    }
    .rud-chip:hover:not(.active) { color: var(--text); border-color: var(--border2); background: var(--card2); }
    .chip-lvl { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

    /* ═══════════════════════════════════════
       TIER BLOCKS
    ═══════════════════════════════════════ */
    .tier-block { margin-bottom: 1.5rem; }
    .tier-title {
      font-size: .6rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .15em; color: var(--muted);
      margin-bottom: .65rem; display: flex; align-items: center; gap: .5rem;
    }
    .tier-title .tier-num { color: var(--accent); flex-shrink: 0; }
    .tier-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ═══════════════════════════════════════
       FAVS
    ═══════════════════════════════════════ */
    .favs-empty { font-size: .8rem; color: var(--muted); line-height: 1.7; padding: .5rem 0; }
    .fav-start-row {
      display: none; align-items: center; gap: .45rem; flex-wrap: wrap;
      padding: .6rem .9rem; margin: 0 -.9rem;
      border-bottom: 1px solid var(--border);
      background: var(--card2); flex-shrink: 0;
    }
    .view-favs .fav-start-row { display: flex; }
    .fav-start-label { font-size: .68rem; color: var(--text2); font-weight: 600; white-space: nowrap; }
    .fav-start-btn {
      padding: .22rem .65rem; border-radius: 2rem;
      border: 1px solid var(--border2); background: transparent;
      font-family: inherit; font-size: .7rem; font-weight: 500;
      cursor: pointer; transition: all .14s; white-space: nowrap;
    }
    .fav-start-btn.bronze   { color: var(--bronze); }
    .fav-start-btn.silver   { color: var(--silver); }
    .fav-start-btn.gold     { color: var(--gold); }
    .fav-start-btn.platinum { color: var(--plat); }
    .fav-start-btn.diamond  { color: var(--diamond); }
    .fav-start-btn.active.bronze   { border-color:rgba(201,124,46,.55);  background:rgba(201,124,46,.14);  font-weight:700; }
    .fav-start-btn.active.silver   { border-color:rgba(168,186,198,.5);  background:rgba(168,186,198,.11); font-weight:700; }
    .fav-start-btn.active.gold     { border-color:rgba(245,184,32,.55);  background:rgba(245,184,32,.14);  font-weight:700; }
    .fav-start-btn.active.platinum { border-color:rgba(216,228,238,.42); background:rgba(216,228,238,.09); font-weight:700; }
    .fav-start-btn.active.diamond  { border-color:rgba(125,211,252,.55); background:rgba(125,211,252,.14); font-weight:700; }
    .fav-start-btn:hover:not(.active) { background: rgba(255,255,255,.06); }

    /* ═══════════════════════════════════════
       DETAIL CARD
    ═══════════════════════════════════════ */
    .detail-card {
      background: var(--card); border: 1px solid var(--border2);
      border-radius: 1.25rem; overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,.35), 0 1px 0 rgba(255,255,255,.04) inset;
      position: relative; max-width: 760px;
    }
    /* shimmer top line */
    .detail-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(56,189,248,.4) 40%, rgba(56,189,248,.55) 50%, rgba(56,189,248,.4) 60%, transparent);
    }

    /* header */
    .dc-header {
      padding: 1.4rem 1.6rem 1.1rem;
      border-bottom: 1px solid var(--border);
    }
    .dc-meta {
      display: flex; align-items: center; gap: .5rem; margin-bottom: .4rem;
    }
    .dc-cat {
      font-size: .59rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .18em; color: var(--accent); opacity: .82;
    }
    .dc-tier {
      font-size: .59rem; font-weight: 600; padding: .1rem .4rem;
      border-radius: 2rem; border: 1px solid rgba(56,189,248,.2);
      background: rgba(56,189,248,.08); color: var(--text2);
    }
    .dc-title-row {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: .75rem;
    }
    .dc-name {
      font-size: 1.6rem; font-weight: 800;
      line-height: 1.1; letter-spacing: -.03em; flex: 1;
    }
    .fav-btn {
      background: transparent; border: none; cursor: pointer;
      font-size: 1.25rem; line-height: 1; padding: .15rem .2rem;
      color: var(--muted); transition: color .15s, transform .15s; flex-shrink: 0;
    }
    .fav-btn:hover { color: var(--text); transform: scale(1.2); }
    .fav-btn.active { color: var(--gold); }
    .dc-desc {
      font-size: .8rem; color: var(--text2); line-height: 1.6;
      margin-top: .6rem; display: none;
    }

    /* sections */
    .dc-section { padding: 1.1rem 1.6rem; border-bottom: 1px solid var(--border); }
    .dc-section:last-child { border-bottom: none; }
    .dc-section-label {
      font-size: .58rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .14em; color: var(--muted); margin-bottom: .7rem;
    }

    /* staff / notation image */
    .staff-wrap {
      overflow-x: auto; scrollbar-width: thin;
      scrollbar-color: var(--border2) transparent;
    }
    .staff-wrap svg { display: block; }
    .vf-img-wrap {
      display: flex; align-items: center; justify-content: center;
      padding: .25rem 0;
    }
    .vf-img-wrap img {
      display: block;
      max-width: 100%;
      height: auto;
      border-radius: 6px;
      filter: invert(1) brightness(.88);
      user-select: none;
      -webkit-user-drag: none;
    }

    /* sticking */
    .sticking {
      display: flex; gap: .3rem; flex-wrap: wrap;
      font-size: 1.3rem; font-weight: 700;
      letter-spacing: .06em; align-items: baseline; line-height: 1.8;
    }
    .sR { color: var(--R); } .sL { color: var(--L); }
    .sg { font-size: .62rem; vertical-align: super; opacity: .7; }
    .ssep { color: rgba(148,163,184,.18); padding: 0 .15rem; font-weight: 300; }

    /* level strip */
    .level-strip {
      display: flex; gap: .3rem; flex-wrap: wrap;
    }
    .lvl-btn {
      display: flex; align-items: center; gap: .3rem;
      padding: .32rem .8rem; border-radius: .5rem;
      border: 1px solid transparent; background: rgba(255,255,255,.03);
      font-family: inherit; font-size: .72rem; font-weight: 500;
      cursor: pointer; transition: all .16s; white-space: nowrap;
    }
    .lvl-btn .check { font-size: .65rem; }
    .lvl-btn .bpm-hint { font-size: .6rem; opacity: .5; font-weight: 400; }
    .lvl-btn.bronze   { color:var(--bronze);  border-color:rgba(201,124,46,.22);  }
    .lvl-btn.silver   { color:var(--silver);  border-color:rgba(168,186,198,.22); }
    .lvl-btn.gold     { color:var(--gold);    border-color:rgba(245,184,32,.22);  }
    .lvl-btn.platinum { color:var(--plat);    border-color:rgba(216,228,238,.18); }
    .lvl-btn.diamond  { color:var(--diamond); border-color:rgba(125,211,252,.22); }
    .lvl-btn:not(.reached) { opacity: .35; }
    .lvl-btn.bronze.reached   { background:rgba(201,124,46,.1);   border-color:rgba(201,124,46,.42);  }
    .lvl-btn.silver.reached   { background:rgba(168,186,198,.08); border-color:rgba(168,186,198,.38); }
    .lvl-btn.gold.reached     { background:rgba(245,184,32,.1);   border-color:rgba(245,184,32,.42);  }
    .lvl-btn.platinum.reached { background:rgba(216,228,238,.07); border-color:rgba(216,228,238,.32); }
    .lvl-btn.diamond.reached  { background:rgba(125,211,252,.1);  border-color:rgba(125,211,252,.42); }
    .lvl-btn:hover { opacity: 1 !important; }
    .lvl-btn:active { transform: scale(.95); }

    /* audio player */
    .audio-player {
      background: rgba(0,0,0,.18); border: 1px solid var(--border);
      border-radius: .75rem; padding: .85rem 1rem;
    }
    .ap-tracks { display: flex; gap: .25rem; flex-wrap: wrap; margin-bottom: .7rem; }
    .ap-track {
      padding: .2rem .58rem; border-radius: 2rem;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); font-family: inherit; font-size: .69rem;
      font-weight: 400; cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .ap-track.active { border-color:rgba(56,189,248,.4); color:var(--accent); background:rgba(56,189,248,.1); font-weight:600; }
    .ap-track:hover:not(.active) { color: var(--text); border-color: var(--border2); }
    .ap-controls { display: flex; align-items: center; gap: .8rem; }
    .ap-play {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--accent); border: none; color: #061422;
      font-size: .95rem; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s; box-shadow: 0 0 18px rgba(56,189,248,.28);
    }
    .ap-play:hover { background: #7dd3fc; transform: scale(1.06); }
    .ap-play.playing { background: var(--R); color: #fff; box-shadow: 0 0 14px rgba(248,113,113,.28); }
    .ap-play.playing:hover { background: #fca5a5; }
    .ap-progress-wrap {
      flex: 1; height: 4px; background: rgba(255,255,255,.07);
      border-radius: 2px; cursor: pointer; overflow: hidden;
    }
    .ap-progress-fill {
      height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 2px; width: 0%; pointer-events: none; transition: width .25s linear;
    }
    .ap-time { font-size: .67rem; color: var(--muted); white-space: nowrap; min-width: 36px; text-align: right; font-variant-numeric: tabular-nums; font-weight: 500; }
    .ap-unavail { font-size: .74rem; color: var(--muted); font-style: italic; }

    /* favs nav arrows */
    .fav-nav-row {
      display: none; align-items: center; justify-content: space-between;
      padding: .8rem 1.6rem; border-top: 1px solid var(--border);
      background: rgba(0,0,0,.12);
    }
    .view-favs .fav-nav-row { display: flex; }
    .fav-arrow {
      display: flex; width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid var(--border2); background: var(--card2);
      color: var(--muted); cursor: pointer; align-items: center; justify-content: center;
      transition: all .15s; flex-shrink: 0;
    }
    .fav-arrow:hover:not(:disabled) { color: var(--text); border-color: rgba(56,189,248,.4); background: var(--surface); }
    .fav-arrow:disabled { opacity: .2; cursor: default; pointer-events: none; }
    .fav-counter { font-size: .72rem; color: var(--muted); font-variant-numeric: tabular-nums; font-weight: 500; }

    /* card transitions */
    @keyframes rud-out   { from{opacity:1;transform:translateX(0) scale(1);}    to{opacity:0;transform:translateX(-20px) scale(.984);} }
    @keyframes rud-in    { from{opacity:0;transform:translateX(24px) scale(.984);}  to{opacity:1;transform:none;} }
    @keyframes rud-out-r { from{opacity:1;transform:translateX(0) scale(1);}    to{opacity:0;transform:translateX(20px) scale(.984);} }
    @keyframes rud-in-r  { from{opacity:0;transform:translateX(-24px) scale(.984);} to{opacity:1;transform:none;} }
    .detail-card.rud-out   { animation:rud-out   .18s cubic-bezier(.4,0,1,1) forwards; pointer-events:none; }
    .detail-card.rud-in    { animation:rud-in    .26s cubic-bezier(0,0,.2,1) forwards; }
    .detail-card.rud-out-r { animation:rud-out-r .18s cubic-bezier(.4,0,1,1) forwards; pointer-events:none; }
    .detail-card.rud-in-r  { animation:rud-in-r  .26s cubic-bezier(0,0,.2,1) forwards; }

    /* ═══════════════════════════════════════
       BOTTOM NAV — mobile only
    ═══════════════════════════════════════ */
    .bottom-nav { display: none; }

    /* ═══════════════════════════════════════
       MOBILE PANEL OVERLAY
    ═══════════════════════════════════════ */
    .mob-panel {
      display: none; /* shown by JS on mobile */
    }

    /* ═══════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════ */
    @media (max-width: 700px) {
      :root { --botbar: 58px; }

      /* hide desktop sidebar */
      .sidebar { display: none; }

      /* detail area fills all width, extra bottom padding for tab bar */
      .detail-area {
        padding: .9rem 1rem calc(var(--botbar) + 1.25rem) 1rem;
        overflow: visible;
      }

      /* mobile: show the panel control area above the card */
      .mob-panel {
        display: block;
        padding: .75rem 1rem .5rem;
        border-bottom: 1px solid var(--border);
        background: var(--card2);
        position: sticky; top: calc(var(--topbar) + 3px); z-index: 50;
      }
      .mob-panel-tabs {
        display: flex; gap: 2px;
        background: rgba(0,0,0,.25);
        border: 1px solid var(--border);
        border-radius: .6rem; padding: 3px; margin-bottom: .6rem;
        width: fit-content;
      }
      .m-tab {
        padding: .3rem .9rem; border-radius: .42rem; border: none;
        background: transparent; color: var(--muted);
        font-family: inherit; font-size: .76rem; font-weight: 500;
        cursor: pointer; transition: all .18s; white-space: nowrap;
      }
      .m-tab.active { background: var(--surface); color: var(--text); font-weight: 700; box-shadow: 0 1px 4px rgba(0,0,0,.35); }
      .m-tab:hover:not(.active) { color: var(--text); }
      .mob-list {

const LEVELS=[

  {key:'diamond', name:'Diamante',bpm:160, cls:'diamond'},
];
let rudProgress=JSON.parse(localStorage.getItem('rudProgress')||'{}');
function saveProgress(){localStorage.setItem('rudProgress',JSON.stringify(rudProgress));}
let rudFavs=new Set(JSON.parse(localStorage.getItem('rudFavs')||'[]'));
function saveFavs(){localStorage.setItem('rudFavs',JSON.stringify([...rudFavs]));}
function toggleFav(){
  if(!currentRud)return;
  if(rudFavs.has(currentRud.id))rudFavs.delete(currentRud.id);
  else rudFavs.add(currentRud.id);
  saveFavs();updateFavBtn();
  if(currentView==='favs'){buildFavsPanel();updateFavArrows();}
}
function updateFavBtn(){
  const btn=document.getElementById('favBtn');
  if(!btn||!currentRud)return;
  const on=rudFavs.has(currentRud.id);
  btn.textContent=on?'★':'☆';
  btn.classList.toggle('active',on);
  btn.title=on?'Quitar de favoritos':'Añadir a favoritos';
}
function updateFavArrows(){
  if(currentView!=='favs'){return;}
  const sorted=getFavsSorted();
  const ci=sorted.findIndex(r=>r.id===currentRud.id);
  const prev=document.getElementById('cardPrev');
  const next=document.getElementById('cardNext');
  const counter=document.getElementById('favCounter');
  if(prev)prev.disabled=(ci<=0);
  if(next)next.disabled=(ci<0||ci>=sorted.length-1);
  if(counter)counter.textContent=sorted.length?(ci+1)+'/'+sorted.length:'';
}
function navFav(dir){
  const sorted=getFavsSorted();
  const ci=sorted.findIndex(r=>r.id===currentRud.id);
  const target=sorted[ci+dir];
  if(!target)return;
  apFavsAutoPlay=!!(apAudio && !apAudio.paused);
  selectRud(target, dir);
}
function buildFavsPanel(){
  const el=document.getElementById('favsPanel');
  const favRuds=RUDIMENTS.filter(r=>rudFavs.has(r.id));
  if(!favRuds.length){
    el.innerHTML='<div class="favs-empty">Aún no tienes favoritos. Pulsa ☆ en cualquier rudimento para guardarlo aquí.</div>';
    return;
  }
  el.innerHTML='';
  const wrap=document.createElement('div');wrap.className='rud-chips';
  favRuds.forEach(r=>wrap.appendChild(makeChip(r)));
  el.appendChild(wrap);
}
function buildFavStartRow(){
  const row=document.getElementById('favStartRow');
  if(!row)return;
  row.innerHTML='';
  const lbl=document.createElement('span');lbl.className='fav-start-label';lbl.textContent='Empezar desde:';
  row.appendChild(lbl);
  LEVELS.forEach(lvl=>{
    const btn=document.createElement('button');
    btn.className='fav-start-btn '+lvl.cls+(lvl.key===apFavsStartKey?' active':'');
    btn.textContent=lvl.name;
    btn.onclick=()=>{
      apFavsStartKey=lvl.key;
      row.querySelectorAll('.fav-start-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
    };
    row.appendChild(btn);
  });
}

function levelColor(key){const l=LEVELS.find(l=>l.key===key);if(!l)return 'transparent';const map={bronze:'#cd7f32',silver:'#b0bec5',gold:'#fbbf24',platinum:'#e0e7ef',diamond:'#7dd3fc'};return map[l.key]||'transparent';}

function renderStaff(rud){
  const staffY=64, svgH=112, noteW=42, graceW=20, dragW=30, groupGap=22, lPad=38, rPad=38;
  const colR='#fb7185', colL='#60a5fa';
  const staffC='#3d5267';   // staff line / barlines / repeat dots
  const beamC ='#4a6070';   // note beams
  const barC  ='#2e4157';   // group separator barlines
  const nc    ='#b8c8d8';   // note head/stem/grace — solid, no alpha
  const ncG   ='#8fa8bf';   // grace/drag notes — slightly dimmer solid
  const slots=[]; let x=lPad;
  rud.pattern.forEach((group,gi)=>{
    group.forEach(note=>{
      if(note.g)x+=graceW;
      if(note.d)x+=dragW;
      slots.push({x,note,gi});
      x+=noteW;
    });
    x+=groupGap;
  });
  const totalW=x-groupGap+rPad+20;
  let s=`<svg width="${totalW}" height="${svgH}" xmlns="http://www.w3.org/2000/svg">`;
  s+=`<line x1="${lPad-14}" y1="${staffY}" x2="${totalW-rPad+14}" y2="${staffY}" stroke="${staffC}" stroke-width="1.5"/>`;
  s+=`<line x1="${lPad-14}" y1="${staffY-24}" x2="${lPad-14}" y2="${staffY+7}" stroke="${staffC}" stroke-width="1.5" stroke-linecap="round"/>`;
  s+=`<line x1="${lPad-7}"  y1="${staffY-24}" x2="${lPad-7}"  y2="${staffY+7}" stroke="${staffC}" stroke-width="5"   stroke-linecap="round"/>`;
  const ex=totalW-rPad+14;
  s+=`<line x1="${ex-7}" y1="${staffY-24}" x2="${ex-7}" y2="${staffY+7}" stroke="${staffC}" stroke-width="5"   stroke-linecap="round"/>`;
  s+=`<line x1="${ex-1}" y1="${staffY-24}" x2="${ex-1}" y2="${staffY+7}" stroke="${staffC}" stroke-width="1.5" stroke-linecap="round"/>`;
  s+=`<circle cx="${ex-13}" cy="${staffY-14}" r="3" fill="${staffC}"/>`;
  s+=`<circle cx="${ex-13}" cy="${staffY-5}"  r="3" fill="${staffC}"/>`;
  rud.pattern.forEach((group,gi)=>{
    if(group.length<2)return;
    const gs=slots.filter(sl=>sl.gi===gi);
    const bx1=gs[0].x+6, bx2=gs[gs.length-1].x+6, by=staffY-36;
    s+=`<rect x="${bx1}" y="${by}"   width="${bx2-bx1}" height="5" rx="2.5" fill="${beamC}"/>`;
    if(group.length>=4)
      s+=`<rect x="${bx1}" y="${by+9}" width="${bx2-bx1}" height="5" rx="2.5" fill="${beamC}"/>`;
    if(group.length===3)
      s+=`<rect x="${bx1}" y="${by+9}" width="${(bx2-bx1)*0.62}" height="5" rx="2.5" fill="${beamC}"/>`;
    if(group.length===3||group.length===6){
      const mid=(bx1+bx2)/2, ty=by-10, num=group.length, bw=Math.min((bx2-bx1)*0.28,14);
      s+=`<line x1="${mid-bw}" y1="${ty+5}" x2="${mid-bw}" y2="${ty-1}" stroke="${beamC}" stroke-width="1.2" stroke-linecap="round"/>`;
      s+=`<line x1="${mid-bw}" y1="${ty-1}" x2="${mid-6}"  y2="${ty-1}" stroke="${beamC}" stroke-width="1.2" stroke-linecap="round"/>`;
      s+=`<line x1="${mid+bw}" y1="${ty+5}" x2="${mid+bw}" y2="${ty-1}" stroke="${beamC}" stroke-width="1.2" stroke-linecap="round"/>`;
      s+=`<line x1="${mid+bw}" y1="${ty-1}" x2="${mid+6}"  y2="${ty-1}" stroke="${beamC}" stroke-width="1.2" stroke-linecap="round"/>`;
      s+=`<text x="${mid}" y="${ty+2}" text-anchor="middle" dominant-baseline="middle" fill="${beamC}" font-size="11" font-weight="700" font-family="Inter,sans-serif">${num}</text>`;
    }
  });
  rud.pattern.forEach((group,gi)=>{
    if(gi===0)return;
    const prev=slots.filter(sl=>sl.gi===gi-1).pop();
    const cur =slots.find(sl=>sl.gi===gi);
    if(!prev||!cur)return;
    const bx=(prev.x+cur.x)/2;
    s+=`<line x1="${bx}" y1="${staffY-22}" x2="${bx}" y2="${staffY+5}" stroke="${barC}" stroke-width="1" stroke-linecap="round"/>`;
  });
  slots.forEach(({x,note})=>{
    const col=note.h==='R'?colR:colL;   // colored R/L label
    if(note.d){
      [-dragW+5,-dragW+16].forEach((dx,di)=>{
        const gx=x+dx;
        s+=`<ellipse cx="${gx}" cy="${staffY}" rx="4" ry="3" fill="${ncG}" transform="rotate(-15 ${gx} ${staffY})"/>`;
        s+=`<line x1="${gx+3}" y1="${staffY-2}" x2="${gx+3.5}" y2="${staffY-19}" stroke="${ncG}" stroke-width="1.3"/>`;
        if(di===1)s+=`<line x1="${gx-3}" y1="${staffY-17}" x2="${gx+9}" y2="${staffY-10}" stroke="${ncG}" stroke-width="1.3"/>`;
      });
    }
    if(note.g){
      const gx=x-graceW+4;
      s+=`<ellipse cx="${gx}" cy="${staffY}" rx="4" ry="3" fill="${ncG}" transform="rotate(-15 ${gx} ${staffY})"/>`;
      s+=`<line x1="${gx+3}" y1="${staffY-2}" x2="${gx+3.5}" y2="${staffY-19}" stroke="${ncG}" stroke-width="1.3"/>`;
      s+=`<line x1="${gx-2}" y1="${staffY-17}" x2="${gx+8}"  y2="${staffY-10}" stroke="${ncG}" stroke-width="1.5"/>`;
      s+=`<line x1="${gx-1}" y1="${staffY-21}" x2="${gx+8}" y2="${staffY-10}" stroke="${ncG}" stroke-width="1.1"/>`;
    }
    s+=`<line x1="${x+6}" y1="${staffY-5}" x2="${x+6}" y2="${staffY-36}" stroke="${nc}" stroke-width="2" stroke-linecap="round"/>`;
    if(note.b)s+=`<text x="${x+11}" y="${staffY-22}" fill="${nc}" font-size="13" font-style="italic" font-family="Georgia,serif">z</text>`;
    s+=`<ellipse cx="${x}" cy="${staffY}" rx="8" ry="5.8" fill="${nc}" transform="rotate(-15 ${x} ${staffY})"/>`;
    if(note.a)s+=`<path d="M${x-7} ${staffY-50} L${x} ${staffY-43} L${x+7} ${staffY-50}" stroke="${nc}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>`;
    s+=`<text x="${x}" y="${staffY+23}" text-anchor="middle" fill="${col}" font-size="11.5" font-weight="700" font-family="Inter,sans-serif">${note.h}</text>`;
  });
  return s+'</svg>';
}
function renderSticking(rud){
  return rud.pattern.map((group,gi)=>{
    const part=group.map(note=>{
      let t='';
      if(note.d){const gc=note.d==='l'?'sL':'sR';t+=`<span class="${gc} sg">${note.d}${note.d}</span>`;}
      if(note.g){const gc=note.g==='l'?'sL':'sR';t+=`<span class="${gc} sg">${note.g}</span>`;}
      const cl=note.h==='R'?'sR':'sL';
      const acc=note.a?`<span style="font-size:.65rem;vertical-align:super">›</span>`:'';
      return t+`<span class="${cl}">${acc}${note.h}</span>`;
    }).join(' ');
    return (gi>0?`<span class="ssep">|</span>`:'')+part;
  }).join('');
}

let currentRud=RUDIMENTS[0], currentCat=RUDIMENTS[0].cat, currentView='categ';
const categories=[...new Set(RUDIMENTS.map(r=>r.cat))];
const tierNames={1:'Tier 1 — Fundamentos',2:'Tier 2 — Construcción',3:'Tier 3 — Desarrollo',4:'Tier 4 — Maestría'};
const isMobile=()=>window.innerWidth<=700;

function buildCatTabs(){
  const el=document.getElementById('catTabs');el.innerHTML='';
  categories.forEach(cat=>{
    const btn=document.createElement('button');
    btn.className='cat-tab'+(cat===currentCat?' active':'');
    btn.textContent=cat;
    btn.onclick=()=>{currentCat=cat;buildCatTabs();buildChipsCateg();const f=RUDIMENTS.find(r=>r.cat===cat);if(f)selectRud(f);};
    el.appendChild(btn);
  });
}
function buildChipsCateg(){
  const el=document.getElementById('rudChipsCateg');el.innerHTML='';
  RUDIMENTS.filter(r=>r.cat===currentCat).forEach(r=>el.appendChild(makeChip(r)));
}
function buildTierBlocks(){
  const el=document.getElementById('tierBlocks');el.innerHTML='';
  [1,2,3,4].forEach(t=>{
    const block=document.createElement('div');block.className='tier-block';
    const title=document.createElement('div');title.className='tier-title';
    title.innerHTML=`<span class="tier-num">${t}</span>${tierNames[t]}`;
    const chips=document.createElement('div');chips.className='rud-chips';
    RUDIMENTS.filter(r=>r.tier===t).forEach(r=>chips.appendChild(makeChip(r)));
    block.appendChild(title);block.appendChild(chips);el.appendChild(block);
  });
}
function makeChip(rud){
  const btn=document.createElement('button');
  const lvl=rudProgress[rud.id];
  btn.className='rud-chip'+(rud===currentRud?' active':'');
  btn.innerHTML=`<span class="chip-lvl" style="background:${levelColor(lvl)}"></span>${rud.name}`;
  btn.onclick=()=>selectRud(rud);
  return btn;
}

/* Build the mobile panel list */
function buildMobList(){
  const el=document.getElementById('mobList');
  if(!el)return;
  el.innerHTML='';
  if(currentView==='categ'){
    /* horizontal scrollable chips of current category + category pill selector */
    const catWrap=document.createElement('div');catWrap.style.cssText='display:flex;gap:.3rem;overflow-x:auto;scrollbar-width:none;padding-bottom:.4rem;margin-bottom:.5rem;';
    categories.forEach(cat=>{
      const btn=document.createElement('button');
      btn.className='cat-tab'+(cat===currentCat?' active':'');
      btn.textContent=cat;
      btn.onclick=()=>{currentCat=cat;buildCatTabs();buildChipsCateg();buildMobList();const f=RUDIMENTS.find(r=>r.cat===cat);if(f)selectRud(f);};
      catWrap.appendChild(btn);
    });
    el.appendChild(catWrap);
    const chips=document.createElement('div');chips.className='rud-chips';chips.style.flexWrap='nowrap';
    RUDIMENTS.filter(r=>r.cat===currentCat).forEach(r=>chips.appendChild(makeChip(r)));
    el.appendChild(chips);
  } else if(currentView==='tier'){
    [1,2,3,4].forEach(t=>{
      const block=document.createElement('div');block.style.cssText='margin-bottom:.7rem;';
      const title=document.createElement('div');title.className='tier-title';title.style.marginBottom='.4rem';
      title.innerHTML=`<span class="tier-num" style="font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.15em;color:var(--accent)">${tierNames[t]}</span>`;
      const chips=document.createElement('div');chips.className='rud-chips';chips.style.flexWrap='nowrap';
      RUDIMENTS.filter(r=>r.tier===t).forEach(r=>chips.appendChild(makeChip(r)));
      block.appendChild(title);block.appendChild(chips);el.appendChild(block);
    });
  } else {
    const favRuds=RUDIMENTS.filter(r=>rudFavs.has(r.id));
    if(!favRuds.length){
      el.innerHTML='<span style="font-size:.78rem;color:var(--muted)">Sin favoritos aún — pulsa ☆</span>';
      return;
    }
    const chips=document.createElement('div');chips.className='rud-chips';chips.style.flexWrap='nowrap';
    favRuds.forEach(r=>chips.appendChild(makeChip(r)));
    el.appendChild(chips);
  }
}

function setView(v){
  currentView=v;
  /* desktop sidebar tabs */
  ['vtCateg','vtTier','vtFavs'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.classList.toggle('active',id==='vtCateg'&&v==='categ'||id==='vtTier'&&v==='tier'||id==='vtFavs'&&v==='favs');
  });
  /* mobile tabs */
  ['mtCateg','mtTier','mtFavs'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.classList.toggle('active',id==='mtCateg'&&v==='categ'||id==='mtTier'&&v==='tier'||id==='mtFavs'&&v==='favs');
  });
  document.getElementById('categPanel').style.display=v==='categ'?'':'none';
  document.getElementById('tierPanel').style.display=v==='tier'?'':'none';
  document.getElementById('favsPanel').style.display=v==='favs'?'':'none';
  document.getElementById('appLayout').classList.toggle('view-favs',v==='favs');
  if(v==='tier')buildTierBlocks();
  else if(v==='favs'){buildFavsPanel();updateFavArrows();}
  else{buildCatTabs();buildChipsCateg();}
  buildMobList();
}
function selectRud(rud, dir){
  const card=document.getElementById('detailCard');
  if(dir&&card){
    const outCls=dir>0?'rud-out':'rud-out-r', inCls=dir>0?'rud-in':'rud-in-r';
    card.classList.remove('rud-in','rud-in-r','rud-out','rud-out-r');
    card.classList.add(outCls);
    setTimeout(()=>{card.classList.remove(outCls);_applyRud(rud);void card.offsetWidth;card.classList.add(inCls);},190);
    return;
  }
  _applyRud(rud);
  /* on mobile: scroll to card */
  if(isMobile())card.scrollIntoView({behavior:'smooth',block:'start'});
}
function _applyRud(rud){
  currentRud=rud;currentCat=rud.cat;
  document.getElementById('rudCatLabel').textContent=rud.cat;
  document.getElementById('rudName').textContent=rud.name;
  document.getElementById('rudTierBadge').textContent='Tier '+rud.tier;
  buildLevelStrip(rud);
  buildAudioPlayer(rud);
  updateFavBtn();
  const vfSlug=VF_IMG[rud.id];
  document.getElementById('staffWrap').innerHTML=vfSlug
    ?`<div class="vf-img-wrap"><img src="${VF_IMG_BASE}${vfSlug}.webp" alt="${rud.name}" loading="lazy"/></div>`
    :renderStaff(rud);
  if(currentView==='categ'){buildCatTabs();buildChipsCateg();}
  else if(currentView==='tier')buildTierBlocks();
  else{buildFavsPanel();updateFavArrows();}
  buildMobList();
}
function buildLevelStrip(rud){
  const el=document.getElementById('levelStrip');el.innerHTML='';
  const ci=levelIndex(rudProgress[rud.id]);
  LEVELS.forEach((lvl,i)=>{
    const btn=document.createElement('button');
    btn.className=`lvl-btn ${lvl.cls}`+(i<=ci?' reached':'');
    btn.innerHTML=(i<=ci?'<span class="check">✓</span>':'')+`${lvl.name} <span class="bpm-hint">${lvl.bpm}bpm</span>`;
    btn.title=`Marcar ${lvl.name} (${lvl.bpm} BPM)`;
    btn.onclick=()=>{
      rudProgress[rud.id]=rudProgress[rud.id]===lvl.key?null:lvl.key;
      if(!rudProgress[rud.id])delete rudProgress[rud.id];
      saveProgress();buildLevelStrip(rud);refreshChips();updateProgBanner();
    };
    el.appendChild(btn);
  });
}
function refreshChips(){
  if(currentView==='categ')buildChipsCateg();
  else if(currentView==='tier')buildTierBlocks();
  else buildFavsPanel();
  buildMobList();
}
function updateProgBanner(){
  const cum={bronze:0,silver:0,gold:0,platinum:0,diamond:0};
  RUDIMENTS.forEach(r=>{const li=levelIndex(rudProgress[r.id]);LEVELS.forEach((l,i)=>{if(li>=i)cum[l.key]++;});});
  document.getElementById('cBronze').textContent=cum.bronze;
  document.getElementById('cSilver').textContent=cum.silver;
  document.getElementById('cGold').textContent=cum.gold;
  document.getElementById('cPlat').textContent=cum.platinum;
  document.getElementById('cDiamond').textContent=cum.diamond;
  const total=40;
  document.getElementById('pbBronze').style.width=(cum.bronze/total*100)+'%';
  document.getElementById('pbSilver').style.width=(cum.silver/total*100)+'%';
  document.getElementById('pbGold').style.width=(cum.gold/total*100)+'%';
  document.getElementById('pbPlat').style.width=(cum.platinum/total*100)+'%';
  document.getElementById('pbDiamond').style.width=(cum.diamond/total*100)+'%';
}
const VF_BASE='https://ae.vicfirth.com/wp-content/uploads/';
const VF_STEMS={
  1:'01_Single-Stroke-Roll-',2:'02_Single-Stroke-4_',3:'03_Single-Stroke-7_',
  14:'05_Triple-Stroke-Roll_',4:'06_Double-Stroke-Roll_',5:'07_Five-Stroke-Roll_',
  6:'08_Six-Stroke-Roll_',7:'09_Seven-Stroke-Roll-',9:'10_Nine-Stroke-Roll_',
  10:'11_Ten-Stroke-Roll_',8:'12_Eleven-Stroke-Roll_',11:'13_Thirteen-Stroke-Roll_',
  12:'14_Fifteen-Stroke-Roll_',13:'15_Seventeen-Stroke-Roll_',16:'16_Single-Paradiddle_',
  17:'17_Double-Paradiddle_',18:'18_Triple-Paradiddle_',19:'19_Paradiddle-diddle_',
  20:'20_Flam_',21:'21_Flam-Accent_',22:'22_Flam-Tap_',23:'23_Flamacue_',
  24:'24_Flam-Paradiddle_',25:'25_Flammed-Mill_',26:'26_Flam-Paradiddle-diddle_',
  27:'27_Patafla-fla_',28:'28_Swiss-Army-Triplet_',29:'29_Inverted-Flam-Tap_',
  30:'30_Flam-Drag_',32:'32_Single-Drag-Tap_',33:'33_Double-Drag-Tap_',
  34:'34_Lesson-25_',35:'35_Single-Dragadiddle_',36:'36_Drag-Paradiddle-1_',
  37:'37_Drag-Paradiddle-2_',38:'38_Single-Ratamacue_',39:'39_Double-Ratamacue_',
  40:'40_Triple-Ratamacue_',
};
const AP_TRACKS=[
  {key:'open-close-open',label:'O-C-O'},{key:'bronze',label:'Bronce'},
  {key:'silver',label:'Plata'},{key:'gold',label:'Oro'},
  {key:'platinum',label:'Platino'},{key:'diamond',label:'Diamante'},
];
let apAudio=null, apCurrentKey='open-close-open', apStem=null, apFavsAutoPlay=false, apFavsStartKey='bronze';
function getFavsSorted(){return RUDIMENTS.filter(r=>rudFavs.has(r.id)).sort((a,b)=>a.tier-b.tier||a.id-b.id);}
function buildAudioPlayer(rud){
  const el=document.getElementById('audioPlayer');
  const sec=document.getElementById('audioSection');
  const stem=VF_STEMS[rud.id]||null;
  apStem=stem;
  if(apAudio){apAudio.pause();apAudio.src='';}
  sec.style.display='';
  if(!stem){el.innerHTML='<div class="ap-unavail">Audio no disponible para este rudimento.</div>';return;}
  apCurrentKey=apFavsAutoPlay?apFavsStartKey:'open-close-open';
  const btns=AP_TRACKS.map(t=>`<button class="ap-track${t.key===apCurrentKey?' active':''}" data-key="${t.key}">${t.label}</button>`).join('');
  el.innerHTML=`<div class="ap-tracks">${btns}</div>
    <div class="ap-controls">
      <button class="ap-play" id="apPlay">&#9654;</button>
      <div class="ap-progress-wrap" id="apProgressWrap"><div class="ap-progress-fill" id="apProgressFill"></div></div>
      <span class="ap-time" id="apTime">-:--</span>
    </div>`;
  apAudio=new Audio();apAudio.preload='none';apAudio.src=VF_BASE+apStem+apCurrentKey+'.mp3';
  el.querySelectorAll('.ap-track').forEach(btn=>{btn.onclick=()=>apSelectTrack(btn.dataset.key);});
  document.getElementById('apPlay').onclick=apToggle;
  document.getElementById('apProgressWrap').onclick=e=>{
    if(!apAudio||!apAudio.duration)return;
    const r=e.currentTarget.getBoundingClientRect();
    apAudio.currentTime=((e.clientX-r.left)/r.width)*apAudio.duration;
  };
  apAudio.addEventListener('timeupdate',apUpdateProgress);
  apAudio.addEventListener('ended',()=>{
    const idx=AP_TRACKS.findIndex(t=>t.key===apCurrentKey);
    if(idx>=0&&idx<AP_TRACKS.length-1){apSelectTrack(AP_TRACKS[idx+1].key);apAudio.play().catch(()=>{});}
    else if(currentView==='favs'){
      const sorted=getFavsSorted().filter(r=>VF_STEMS[r.id]);
      const ci=sorted.findIndex(r=>r.id===currentRud.id);
      if(ci>=0&&ci<sorted.length-1){apFavsAutoPlay=true;selectRud(sorted[ci+1],1);}
      else apSetPlay(false);
    }else apSetPlay(false);
  });
  apAudio.addEventListener('play',()=>apSetPlay(true));
  apAudio.addEventListener('pause',()=>apSetPlay(false));
  if(apFavsAutoPlay){apFavsAutoPlay=false;setTimeout(()=>apAudio.play().catch(()=>{}),80);}
}
function apSelectTrack(key){
  const wasPlaying=apAudio&&!apAudio.paused;
  if(apAudio)apAudio.pause();
  apCurrentKey=key;apAudio.src=VF_BASE+apStem+key+'.mp3';
  document.querySelectorAll('#audioPlayer .ap-track').forEach(b=>b.classList.toggle('active',b.dataset.key===key));
  apSetPlay(false);apResetBar();
  if(wasPlaying)apAudio.play().catch(()=>{});
}
function apToggle(){if(!apAudio)return;if(apAudio.paused)apAudio.play().catch(()=>{});else apAudio.pause();}
function apSetPlay(on){const btn=document.getElementById('apPlay');if(!btn)return;btn.innerHTML=on?'&#9646;&#9646;':'&#9654;';btn.classList.toggle('playing',on);}
function apResetBar(){const f=document.getElementById('apProgressFill'),t=document.getElementById('apTime');if(f)f.style.width='0%';if(t)t.textContent='-:--';}
function apUpdateProgress(){
  if(!apAudio)return;
  const f=document.getElementById('apProgressFill'),t=document.getElementById('apTime');
  if(!f||!t)return;
  f.style.width=(apAudio.duration?(apAudio.currentTime/apAudio.duration)*100:0)+'%';
  const rem=apAudio.duration?apAudio.duration-apAudio.currentTime:0;
  t.textContent=`${Math.floor(rem/60)}:${String(Math.floor(rem%60)).padStart(2,'0')}`;
}

buildCatTabs();buildChipsCateg();selectRud(RUDIMENTS[0]);updateProgBanner();buildFavStartRow();buildMobList();
document.getElementById('favBtn').onclick=toggleFav;
</script>
<script>
(function(){
  requestAnimationFrame(function(){requestAnimationFrame(function(){document.body.classList.add('loaded');});});
  document.querySelectorAll('a[href]').forEach(function(a){
    a.addEventListener('click',function(e){
      var href=this.getAttribute('href');
      if(!href||href.startsWith('#')||this.target)return;
      try{if(new URL(href,location.href).origin!==location.origin)return;}catch(_){return;}
      e.preventDefault();document.body.classList.add('exit');
      setTimeout(function(){location.href=href;},280);
    });
  });
})();
</script>
