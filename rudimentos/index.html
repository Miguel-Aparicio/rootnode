<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rudimentos de Batería</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>

<!-- TOP BAR -->
<header class="top-bar">
  <a class="top-bar-back" href="/">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Inicio
  </a>
  <span class="top-bar-sep">/</span>
  <span class="top-bar-title">Rudimentos</span>
  <div class="top-bar-prog">
    <div class="prog-pills">
      <span class="prog-pill bronze"   id="ppBronze" ><span class="pp-icon">🥉</span><span id="cBronze">0</span></span>
      <span class="prog-pill silver"   id="ppSilver" ><span class="pp-icon">🥈</span><span id="cSilver">0</span></span>
      <span class="prog-pill gold"     id="ppGold"   ><span class="pp-icon">🥇</span><span id="cGold">0</span></span>
      <span class="prog-pill platinum" id="ppPlat"   ><span class="pp-icon">🏆</span><span id="cPlat">0</span></span>
      <span class="prog-pill diamond"  id="ppDiamond"><span class="pp-icon">💎</span><span id="cDiamond">0</span></span>
    </div>
  </div>
</header>

<!-- THIN PROGRESS BAR -->
<div class="top-prog-bar">
  <div class="tpb-seg bronze"  ><div class="tpb-fill" id="pbBronze"  style="width:0%"></div></div>
  <div class="tpb-seg silver"  ><div class="tpb-fill" id="pbSilver"  style="width:0%"></div></div>
  <div class="tpb-seg gold"    ><div class="tpb-fill" id="pbGold"    style="width:0%"></div></div>
  <div class="tpb-seg platinum"><div class="tpb-fill" id="pbPlat"    style="width:0%"></div></div>
  <div class="tpb-seg diamond" ><div class="tpb-fill" id="pbDiamond" style="width:0%"></div></div>
</div>

<!-- MOBILE BOTTOM NAV -->
<nav class="bottom-nav" id="bottomNav">
  <button class="bnav-tab active" id="bnavCateg">
    <span class="bnav-icon">🎵</span>
    <span class="bnav-label">Categoría</span>
  </button>
  <button class="bnav-tab" id="bnavTier">
    <span class="bnav-icon">⭐</span>
    <span class="bnav-label">Nivel</span>
  </button>
  <button class="bnav-tab" id="bnavFavs">
    <span class="bnav-icon">☆</span>
    <span class="bnav-label">Favoritos</span>
  </button>
</nav>

<!-- MOBILE SHEET -->
<div class="mob-sheet-backdrop" id="mobSheetBackdrop"></div>
<div class="mob-sheet" id="mobSheet">
  <div class="mob-sheet-handle"></div>
  <div class="mob-sheet-head">
    <span class="mob-sheet-title" id="mobSheetTitle">Categoría</span>
    <button class="mob-sheet-close" id="mobSheetClose" aria-label="Cerrar">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="mob-sheet-body" id="mobSheetBody"></div>
</div>

<!-- APP LAYOUT -->
<div class="app-layout" id="appLayout">

  <!-- SIDEBAR (desktop only) -->
  <aside class="sidebar">
    <div class="sidebar-inner">
      <div class="sidebar-tabs">
        <button class="s-tab active" id="vtCateg">Categoría</button>
        <button class="s-tab"        id="vtTier">Nivel</button>
        <button class="s-tab"        id="vtFavs">Favoritos</button>
        <div class="s-tab-ind" id="sTabInd"></div>
      </div>
      <div class="fav-start-row" id="favStartRow"></div>
      <div class="sidebar-list" id="sidebarList">
        <div id="categPanel">
          <div id="categAccordion" class="acc-list"></div>
        </div>
        <div id="tierPanel" style="display:none"><div id="tierBlocks"></div></div>
        <div id="favsPanel" style="display:none"></div>
      </div>
    </div>
  </aside>

  <!-- DETAIL AREA -->
  <main class="detail-area">
    <div class="detail-card" id="detailCard">
      <div class="dc-header">
        <div class="dc-meta">
          <span class="dc-cat"  id="rudCatLabel"></span>
          <span class="dc-tier" id="rudTierBadge"></span>
        </div>
        <div class="dc-title-row">
          <h1 class="dc-name" id="rudName"></h1>
          <button class="fav-btn" id="favBtn" title="Añadir a favoritos">☆</button>
        </div>
      </div>

      <div class="dc-section" id="audioSection" style="display:none">
        <div class="dc-section-label">Play-along · Vic Firth</div>
        <div class="audio-player" id="audioPlayer"></div>
      </div>

      <div class="dc-section">
        <div class="dc-section-label">Notación</div>
        <div class="staff-wrap" id="staffWrap"></div>
      </div>

      <div class="dc-section">
        <div class="dc-section-label">Logros</div>
        <div class="achievements-strip" id="levelStrip"></div>
      </div>

      <div class="fav-nav-row">
        <button class="fav-arrow" id="cardPrev" aria-label="Anterior">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <span class="fav-counter" id="favCounter"></span>
        <button class="fav-arrow" id="cardNext" aria-label="Siguiente">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>
    </div>
  </main>

</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
