<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Rudimentos · MigueGuay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #080f1a;
      --card:    #0f1e30;
      --card2:   #132337;
      --surface: #172840;
      --accent:  #38bdf8;
      --accent2: #0ea5e9;
      --R:       #f87171;
      --L:       #60a5fa;
      --text:    #e1eaf4;
      --text2:   #94a3b8;
      --muted:   #4d6680;
      --border:  rgba(148,163,184,0.1);
      --border2: rgba(148,163,184,0.2);
      --bronze:  #c97c2e;
      --silver:  #a8bac6;
      --gold:    #ffc400;
      --plat:    #ffe566;
      --diamond: #00d4c0;
      --sidebar: 268px;
      --topbar:  52px;
      --botbar:  60px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100%;
      -webkit-font-smoothing: antialiased;
      opacity: 0;
    }
    body.loaded { animation: fadeIn .35s ease both; }
    body.exit    { animation: fadeOut .28s ease both; pointer-events: none; }
    @keyframes fadeIn  { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
    @keyframes fadeOut { from { opacity:1; } to { opacity:0; } }

    /* ═══════════════════════════════════════
       TOP BAR
    ═══════════════════════════════════════ */
    .top-bar {
      position: sticky; top: 0; z-index: 100;
      height: var(--topbar);
      display: flex; align-items: center; gap: .5rem;
      padding: 0 1.25rem;
      background: rgba(8,15,26,.92);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border-bottom: 1px solid var(--border);
    }
    .top-bar-back {
      display: flex; align-items: center; gap: .35rem;
      color: var(--accent); text-decoration: none;
      font-size: .8rem; font-weight: 500;
      opacity: .75; transition: opacity .15s; flex-shrink: 0;
    }
    .top-bar-back:hover { opacity: 1; }
    .top-bar-sep { color: var(--muted); font-size: .7rem; flex-shrink: 0; }
    .top-bar-title {
      font-size: .88rem; font-weight: 700;
      letter-spacing: -.02em; flex-shrink: 0;
    }
    .top-bar-prog {
      flex: 1; display: flex; align-items: center;
      gap: .5rem; justify-content: flex-end; min-width: 0;
    }
    .prog-pills {
      display: flex; gap: .28rem; flex-wrap: nowrap; overflow: hidden;
      align-items: center;
    }
    .prog-pill {
      display: flex; align-items: center; gap: .22rem;
      font-size: .7rem; font-weight: 700;
      padding: .18rem .52rem .18rem .38rem; border-radius: 2rem;
      border: 1px solid transparent; white-space: nowrap; flex-shrink: 0;
    }
    .prog-pill .pp-icon { font-size: .8rem; line-height: 1; flex-shrink: 0; }
    .prog-pill.bronze  { color:var(--bronze);  border-color:rgba(201,124,46,.38);  background:rgba(201,124,46,.12);  }
    .prog-pill.silver  { color:var(--silver);  border-color:rgba(168,186,198,.38); background:rgba(168,186,198,.1); }
    .prog-pill.gold    { color:var(--gold);    border-color:rgba(255,196,0,.45);   background:rgba(255,196,0,.14);  }
    .prog-pill.platinum{ color:var(--plat);   border-color:rgba(255,229,102,.5);  background:rgba(255,229,102,.13); }
    .prog-pill.diamond { color:var(--diamond); border-color:rgba(0,212,192,.48);  background:rgba(0,212,192,.12); }
    /* progress bar under topbar */
    .top-prog-bar {
      position: sticky; top: var(--topbar); z-index: 99;
      display: flex; gap: 2px; height: 5px;
    }
    .tpb-seg { flex: 1; background: rgba(255,255,255,.09); }
    .tpb-fill { height: 100%; transition: width .6s cubic-bezier(.4,0,.2,1); }
    .tpb-seg.bronze   .tpb-fill { background: var(--bronze); }
    .tpb-seg.silver   .tpb-fill { background: var(--silver); }
    .tpb-seg.gold     .tpb-fill { background: var(--gold); }
    .tpb-seg.platinum .tpb-fill { background: var(--plat); }
    .tpb-seg.diamond  .tpb-fill { background: var(--diamond); }

    /* ═══════════════════════════════════════
       LAYOUT: two-column on desktop
    ═══════════════════════════════════════ */
    .app-layout {
      display: flex;
      min-height: calc(100vh - var(--topbar) - 3px);
    }

    /* ─── SIDEBAR ─── */
    .sidebar {
      width: var(--sidebar);
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
    }
    .sidebar-inner {
      position: sticky;
      top: calc(var(--topbar) + 3px);
      height: calc(100vh - var(--topbar) - 3px);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    /* view tabs in sidebar */
    .sidebar-tabs {
      display: flex; padding: .75rem .9rem .5rem;
      gap: 3px; position: relative;
      background: var(--card2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .s-tab {
      flex: 1; padding: .35rem .3rem;
      border-radius: .45rem; border: none;
      background: transparent; color: var(--muted);
      font-family: inherit; font-size: .75rem; font-weight: 500;
      cursor: pointer; transition: color .18s, background .18s, box-shadow .18s; white-space: nowrap; text-align: center;
    }
    .s-tab.active {
      background: var(--surface); color: var(--text);
      font-weight: 700; box-shadow: 0 1px 4px rgba(0,0,0,.4);
    }
    .s-tab:hover:not(.active) { color: var(--text); background: rgba(255,255,255,.04); }
    .s-tab-ind {
      position: absolute; bottom: 0; left: 0; width: 0; height: 3px;
      background: var(--accent); border-radius: 3px 3px 0 0;
      box-shadow: 0 0 10px rgba(56,189,248,.75), 0 0 22px rgba(56,189,248,.35);
      transition: left .25s cubic-bezier(.4,0,.2,1), width .25s cubic-bezier(.4,0,.2,1);
      pointer-events: none;
    }
    /* scrollable list area */
    .sidebar-list {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: .75rem .9rem 1.5rem;
      scrollbar-width: thin; scrollbar-color: var(--border2) transparent;
    }
    .sidebar-list::-webkit-scrollbar { width: 4px; }
    .sidebar-list::-webkit-scrollbar-track { background: transparent; }
    .sidebar-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    /* ─── DETAIL AREA ─── */
    .detail-area {
      flex: 1; min-width: 0;
      padding: 1.5rem 1.75rem 2.5rem;
      overflow-y: auto;
    }

    /* ═══════════════════════════════════════
       ACCORDION — category selection
    ═══════════════════════════════════════ */
    .acc-list { display: flex; flex-direction: column; }
    .acc-section { border-bottom: 1px solid var(--border); }
    .acc-section:last-child { border-bottom: none; }

    .acc-head {
      display: flex; align-items: center; gap: .5rem;
      padding: .58rem .6rem .58rem .7rem;
      cursor: pointer; border: none; background: transparent;
      width: 100%; font-family: inherit; text-align: left;
      transition: background .15s; outline: none;
    }
    .acc-head:hover { background: rgba(255,255,255,.025); }
    .acc-head.open   { background: rgba(56,189,248,.04); }
    .acc-head.has-active { background: rgba(56,189,248,.05); }

    .acc-name {
      flex: 1; min-width: 0;
      font-size: .73rem; font-weight: 600; color: var(--text2);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      line-height: 1.2; transition: color .15s;
    }
    .acc-head.open .acc-name,
    .acc-head.has-active .acc-name { color: var(--text); }

    .acc-prog-wrap {
      flex-shrink: 0; display: flex; align-items: center; gap: .3rem;
    }
    .acc-badge {
      font-size: .6rem; font-weight: 700; color: var(--muted);
      min-width: 22px; text-align: center; letter-spacing: .01em;
      transition: color .15s;
    }
    .acc-head.open .acc-badge,
    .acc-head.has-active .acc-badge { color: var(--accent); }

    .acc-chevron {
      width: 13px; height: 13px; color: var(--border2); flex-shrink: 0;
      transition: transform .22s ease, color .15s;
    }
    .acc-head.open .acc-chevron,
    .acc-head.has-active .acc-chevron { color: var(--accent); }
    .acc-head.open .acc-chevron { transform: rotate(90deg); }

    /* Thin progress bar under each category header */
    .acc-prog-bar {
      height: 2px; background: rgba(56,189,248,.15); flex-grow: 1;
      border-radius: 1px; overflow: hidden; max-width: 36px;
    }
    .acc-prog-fill {
      height: 100%; background: var(--accent);
      border-radius: 1px; transition: width .3s;
    }

    /* Accordion body */
    .acc-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows .35s cubic-bezier(0,0,.2,1); }
    .acc-body.open { grid-template-rows: 1fr; }
    .acc-body-inner { min-height: 0; overflow: hidden; padding: .15rem .35rem .45rem; }

    /* ═══════════════════════════════════════
       RUDIMENT ROWS (accordion + tier + favs)
    ═══════════════════════════════════════ */
    .rud-list { display: flex; flex-direction: column; gap: .15rem; }
    .rud-row {
      display: flex; align-items: center; gap: .5rem;
      padding: .44rem .6rem .44rem .7rem;
      border-radius: .45rem;
      border: 1px solid transparent;
      box-shadow: inset 2px 0 0 transparent;
      background: transparent;
      font-family: inherit; cursor: pointer; transition: all .14s;
      text-align: left; width: 100%;
    }
    .rud-row:hover:not(.active) { background: rgba(255,255,255,.04); }
    .rud-row.active {
      background: rgba(56,189,248,.08);
      box-shadow: inset 2px 0 0 var(--accent);
      border-color: rgba(56,189,248,.18);
    }
    .rud-row-lvl {
      width: 8px; height: 8px; border-radius: 50%;
      border: 2px solid var(--border2); flex-shrink: 0;
      transition: background .2s, border-color .2s;
    }
    .rud-row-name {
      flex: 1; min-width: 0;
      font-size: .76rem; font-weight: 500; color: var(--text2);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      transition: color .14s;
    }
    .rud-row.active .rud-row-name { color: var(--accent); font-weight: 600; }
    .rud-row:hover:not(.active) .rud-row-name { color: var(--text); }


    /* ═══════════════════════════════════════
       TIER BLOCKS
    ═══════════════════════════════════════ */
    .tier-block { margin-bottom: 1.25rem; }
    .tier-header {
      display: flex; align-items: center; gap: .55rem;
      padding: .5rem .65rem; margin-bottom: .3rem;
      border-radius: .6rem; background: var(--card2);
      border: 1px solid var(--border);
    }
    .tier-header-icon { font-size: .9rem; flex-shrink: 0; }
    .tier-header-info { flex: 1; min-width: 0; }
    .tier-header-name {
      font-size: .72rem; font-weight: 700; color: var(--text);
      line-height: 1.2;
    }
    .tier-header-sub {
      font-size: .6rem; color: var(--muted); font-weight: 500;
      line-height: 1.3;
    }
    .tier-header-count {
      font-size: .62rem; font-weight: 700; color: var(--accent);
      background: rgba(56,189,248,.1); border: 1px solid rgba(56,189,248,.2);
      border-radius: 2rem; padding: .1rem .4rem; flex-shrink: 0;
    }
    /* ─── legacy chip compatibility ─── */
    .rud-chips { display: flex; gap: .28rem; flex-wrap: wrap; }
    .rud-chip {
      padding: .28rem .7rem; border-radius: .45rem;
      border: 1px solid var(--border); background: var(--card);
      color: var(--text2); font-family: inherit;
      font-size: .74rem; font-weight: 400; cursor: pointer;
      transition: all .15s; display: flex; align-items: center;
      gap: .28rem; white-space: nowrap;
    }
    .rud-chip.active {
      background: rgba(56,189,248,.12); color: var(--accent);
      border-color: rgba(56,189,248,.35); font-weight: 600;
    }
    .rud-chip:hover:not(.active) { color: var(--text); border-color: var(--border2); background: var(--card2); }
    .chip-lvl { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

    /* old tier title kept for mobile compat */
    .tier-title {
      font-size: .6rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .15em; color: var(--muted);
      margin-bottom: .65rem; display: flex; align-items: center; gap: .5rem;
    }
    .tier-title .tier-num { color: var(--accent); flex-shrink: 0; }
    .tier-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ═══════════════════════════════════════
       FAVS
    ═══════════════════════════════════════ */
    .favs-empty { font-size: .8rem; color: var(--muted); line-height: 1.7; padding: .5rem 0; }
    .fav-start-row {
      display: none; align-items: center; gap: .45rem; flex-wrap: wrap;
      padding: .6rem .9rem; margin: 0 -.9rem;
      border-bottom: 1px solid var(--border);
      background: var(--card2); flex-shrink: 0;
    }
    .view-favs .fav-start-row { display: flex; }
    .fav-start-label { font-size: .68rem; color: var(--text2); font-weight: 600; white-space: nowrap; }
    .fav-start-btn {
      padding: .22rem .65rem; border-radius: 2rem;
      border: 1px solid var(--border2); background: transparent;
      font-family: inherit; font-size: .7rem; font-weight: 500;
      cursor: pointer; transition: all .14s; white-space: nowrap;
    }
    .fav-start-btn.bronze   { color: var(--bronze); }
    .fav-start-btn.silver   { color: var(--silver); }
    .fav-start-btn.gold     { color: var(--gold); }
    .fav-start-btn.platinum { color: var(--plat); }
    .fav-start-btn.diamond  { color: var(--diamond); }
    .fav-start-btn.active.bronze   { border-color:rgba(201,124,46,.55);  background:rgba(201,124,46,.14);  font-weight:700; }
    .fav-start-btn.active.silver   { border-color:rgba(168,186,198,.5);  background:rgba(168,186,198,.11); font-weight:700; }
    .fav-start-btn.active.gold     { border-color:rgba(245,184,32,.55);  background:rgba(245,184,32,.14);  font-weight:700; }
    .fav-start-btn.active.platinum { border-color:rgba(216,228,238,.42); background:rgba(216,228,238,.09); font-weight:700; }
    .fav-start-btn.active.diamond  { border-color:rgba(125,211,252,.55); background:rgba(125,211,252,.14); font-weight:700; }
    .fav-start-btn:hover:not(.active) { background: rgba(255,255,255,.06); }

    /* ═══════════════════════════════════════
       DETAIL CARD
    ═══════════════════════════════════════ */
    .detail-card {
      background: var(--card); border: 1px solid var(--border2);
      border-radius: 1.25rem; overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,.35), 0 1px 0 rgba(255,255,255,.04) inset;
      position: relative; max-width: 760px;
    }
    /* shimmer top line */
    .detail-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(56,189,248,.4) 40%, rgba(56,189,248,.55) 50%, rgba(56,189,248,.4) 60%, transparent);
    }

    /* header */
    .dc-header {
      padding: 1.4rem 1.6rem 1.1rem;
      border-bottom: 1px solid var(--border);
    }
    .dc-meta {
      display: flex; align-items: center; gap: .5rem; margin-bottom: .4rem;
    }
    .dc-cat {
      font-size: .59rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .18em; color: var(--accent); opacity: .82;
    }
    .dc-tier {
      font-size: .59rem; font-weight: 600; padding: .1rem .4rem;
      border-radius: 2rem; border: 1px solid rgba(56,189,248,.2);
      background: rgba(56,189,248,.08); color: var(--text2);
    }
    .dc-title-row {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: .75rem;
    }
    .dc-name {
      font-size: 1.6rem; font-weight: 800;
      line-height: 1.1; letter-spacing: -.03em; flex: 1;
    }
    .fav-btn {
      background: transparent; border: none; cursor: pointer;
      font-size: 1.25rem; line-height: 1; padding: .15rem .2rem;
      color: var(--muted); transition: color .15s, transform .15s; flex-shrink: 0;
    }
    .fav-btn:hover { color: var(--text); transform: scale(1.2); }
    .fav-btn.active { color: var(--gold); }
    .dc-desc {
      font-size: .8rem; color: var(--text2); line-height: 1.6;
      margin-top: .6rem; display: none;
    }

    /* sections */
    .dc-section { padding: 1.1rem 1.6rem; border-bottom: 1px solid var(--border); }
    .dc-section:last-child { border-bottom: none; }
    .dc-section-label {
      font-size: .58rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .14em; color: var(--muted); margin-bottom: .7rem;
    }

    /* staff / notation image */
    .staff-wrap {
      overflow-x: auto; scrollbar-width: thin;
      scrollbar-color: var(--border2) transparent;
    }
    .staff-wrap svg { display: block; }
    .vf-img-wrap {
      display: flex; align-items: center; justify-content: center;
      padding: .25rem 0;
    }
    .vf-img-wrap img {
      display: block;
      max-width: 100%;
      height: auto;
      border-radius: 6px;
      filter: invert(1) brightness(.88);
      user-select: none;
      -webkit-user-drag: none;
    }

    /* sticking */
    .sticking {
      display: flex; gap: .3rem; flex-wrap: wrap;
      font-size: 1.3rem; font-weight: 700;
      letter-spacing: .06em; align-items: baseline; line-height: 1.8;
    }
    .sR { color: var(--R); } .sL { color: var(--L); }
    .sg { font-size: .62rem; vertical-align: super; opacity: .7; }
    .ssep { color: rgba(148,163,184,.18); padding: 0 .15rem; font-weight: 300; }

    /* level strip */
    /* ═══════════════════════════════════════
       ACHIEVEMENT BADGES
    ═══════════════════════════════════════ */
    .achievements-strip {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: .45rem;
    }
    .ach-card {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: .12rem;
      padding: .45rem .25rem .4rem;
      border-radius: .6rem; border: 1px solid var(--border);
      background: rgba(0,0,0,.15);
      cursor: pointer; font-family: inherit; text-align: center;
      position: relative; overflow: hidden;
      transition: transform .16s, box-shadow .16s, border-color .16s, background .16s;
      user-select: none;
    }
    .ach-card:not(.reached) { opacity: .28; filter: grayscale(.65); }
    .ach-card:not(.reached):hover { opacity: .55; filter: grayscale(.3); transform: translateY(-1px); }
    .ach-card.reached { opacity: 1; filter: none; }
    .ach-card.reached:hover { transform: translateY(-2px); }
    .ach-card.reached:active { transform: scale(.95); }
    .ach-card.reached.bronze   { border-color:rgba(201,124,46,.55);  background:rgba(201,124,46,.1);  box-shadow:0 4px 16px rgba(201,124,46,.22); }
    .ach-card.reached.silver   { border-color:rgba(168,186,198,.48); background:rgba(168,186,198,.09); box-shadow:0 4px 16px rgba(168,186,198,.18); }
    .ach-card.reached.gold     { border-color:rgba(255,196,0,.65);   background:rgba(255,196,0,.13);  box-shadow:0 4px 20px rgba(255,196,0,.3); }
    .ach-card.reached.platinum { border-color:rgba(255,229,102,.7);  background:rgba(255,229,102,.15); box-shadow:0 4px 24px rgba(255,229,102,.38); }
    .ach-card.reached.diamond  { border-color:rgba(0,212,192,.7);    background:rgba(0,212,192,.12); box-shadow:0 4px 28px rgba(0,212,192,.4); }
    .ach-icon { font-size: 1.15rem; line-height: 1; }
    .ach-name {
      font-size: .55rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: .06em; line-height: 1;
    }
    .ach-card.bronze   .ach-name { color: var(--bronze); }
    .ach-card.silver   .ach-name { color: var(--silver); }
    .ach-card.gold     .ach-name { color: var(--gold); }
    .ach-card.platinum .ach-name { color: var(--plat); }
    .ach-card.diamond  .ach-name { color: var(--diamond); }
    .ach-bpm { font-size: .5rem; color: var(--muted); font-weight: 500; font-variant-numeric: tabular-nums; }
    .ach-check {
      position: absolute; top: 5px; right: 7px;
      font-size: .6rem; font-weight: 800; opacity: .85;
    }
    .ach-card.reached.bronze   .ach-check { color: var(--bronze); }
    .ach-card.reached.silver   .ach-check { color: var(--silver); }
    .ach-card.reached.gold     .ach-check { color: var(--gold); }
    .ach-card.reached.platinum .ach-check { color: var(--plat); }
    .ach-card.reached.diamond  .ach-check { color: var(--diamond); }
    @keyframes ach-unlock { 0%{transform:scale(.82)} 55%{transform:scale(1.1)} 82%{transform:scale(.97)} 100%{transform:none} }
    .ach-card.unlock-anim { animation: ach-unlock .38s cubic-bezier(.2,0,.3,1); }

    /* audio player */
    .audio-player {
      background: rgba(0,0,0,.18); border: 1px solid var(--border);
      border-radius: .75rem; padding: .85rem 1rem;
    }
    .ap-tracks { display: flex; gap: .25rem; flex-wrap: wrap; margin-bottom: .7rem; }
    .ap-track {
      padding: .2rem .58rem; border-radius: 2rem;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); font-family: inherit; font-size: .69rem;
      font-weight: 400; cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .ap-track.active { border-color:rgba(56,189,248,.4); color:var(--accent); background:rgba(56,189,248,.1); font-weight:600; }
    .ap-track:hover:not(.active) { color: var(--text); border-color: var(--border2); }
    .ap-controls { display: flex; align-items: center; gap: .8rem; }
    .ap-play {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--accent); border: none; color: #061422;
      font-size: .95rem; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s; box-shadow: 0 0 18px rgba(56,189,248,.28);
    }
    .ap-play:hover { background: #7dd3fc; transform: scale(1.06); }
    .ap-play.playing { background: var(--R); color: #fff; box-shadow: 0 0 14px rgba(248,113,113,.28); }
    .ap-play.playing:hover { background: #fca5a5; }
    .ap-progress-wrap {
      flex: 1; height: 4px; background: rgba(255,255,255,.07);
      border-radius: 2px; cursor: pointer; overflow: hidden;
    }
    .ap-progress-fill {
      height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 2px; width: 0%; pointer-events: none; transition: width .25s linear;
    }
    .ap-time { font-size: .67rem; color: var(--muted); white-space: nowrap; min-width: 36px; text-align: right; font-variant-numeric: tabular-nums; font-weight: 500; }
    .ap-unavail { font-size: .74rem; color: var(--muted); font-style: italic; }

    /* favs nav arrows */
    .fav-nav-row {
      display: none; align-items: center; justify-content: space-between;
      padding: .8rem 1.6rem; border-top: 1px solid var(--border);
      background: rgba(0,0,0,.12);
    }
    .view-favs .fav-nav-row { display: flex; }
    .fav-arrow {
      display: flex; width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid var(--border2); background: var(--card2);
      color: var(--muted); cursor: pointer; align-items: center; justify-content: center;
      transition: all .15s; flex-shrink: 0;
    }
    .fav-arrow:hover:not(:disabled) { color: var(--text); border-color: rgba(56,189,248,.4); background: var(--surface); }
    .fav-arrow:disabled { opacity: .2; cursor: default; pointer-events: none; }
    .fav-counter { font-size: .72rem; color: var(--muted); font-variant-numeric: tabular-nums; font-weight: 500; }

    /* card transitions */
    @keyframes rud-out   { from{opacity:1;transform:translateX(0) scale(1);}    to{opacity:0;transform:translateX(-20px) scale(.984);} }
    @keyframes rud-in    { from{opacity:0;transform:translateX(24px) scale(.984);}  to{opacity:1;transform:none;} }
    @keyframes rud-out-r { from{opacity:1;transform:translateX(0) scale(1);}    to{opacity:0;transform:translateX(20px) scale(.984);} }
    @keyframes rud-in-r  { from{opacity:0;transform:translateX(-24px) scale(.984);} to{opacity:1;transform:none;} }
    .detail-card.rud-out   { animation:rud-out   .18s cubic-bezier(.4,0,1,1) forwards; pointer-events:none; }
    .detail-card.rud-in    { animation:rud-in    .26s cubic-bezier(0,0,.2,1) forwards; }
    .detail-card.rud-out-r { animation:rud-out-r .18s cubic-bezier(.4,0,1,1) forwards; pointer-events:none; }
    .detail-card.rud-in-r  { animation:rud-in-r  .26s cubic-bezier(0,0,.2,1) forwards; }

    /* ─── sidebar panel transitions ─── */
    @keyframes panel-in { from{opacity:0; transform:translateY(14px) scale(.986);} to{opacity:1; transform:none;} }
    .panel-enter { animation: panel-in .28s cubic-bezier(0,0,.2,1) both; }

    /* ─── accordion row stagger ─── */
    @keyframes row-in { from{opacity:0; transform:translateX(-8px);} to{opacity:1; transform:none;} }
    .acc-body.open .rud-row { animation: row-in .2s cubic-bezier(0,0,.2,1) both; }
    .acc-body.open .rud-row:nth-child(1)  { animation-delay: .04s; }
    .acc-body.open .rud-row:nth-child(2)  { animation-delay: .07s; }
    .acc-body.open .rud-row:nth-child(3)  { animation-delay: .10s; }
    .acc-body.open .rud-row:nth-child(4)  { animation-delay: .13s; }
    .acc-body.open .rud-row:nth-child(5)  { animation-delay: .16s; }
    .acc-body.open .rud-row:nth-child(6)  { animation-delay: .19s; }
    .acc-body.open .rud-row:nth-child(7)  { animation-delay: .21s; }
    .acc-body.open .rud-row:nth-child(8)  { animation-delay: .23s; }
    .acc-body.open .rud-row:nth-child(n+9){ animation-delay: .25s; }

    /* no stagger on mobile — avoids grid-height measurement conflict */

    /* ─── rud-row click ripple ─── */
    @keyframes row-tap { 0%{transform:scale(1)} 40%{transform:scale(.97)} 100%{transform:scale(1)} }
    .rud-row:active { animation: row-tap .18s ease both; }

    /* ═══════════════════════════════════════
       BOTTOM NAV — mobile only
    ═══════════════════════════════════════ */
    .bottom-nav { display: none; }
    .mob-panel  { display: none; }

    /* ═══════════════════════════════════════
       MOBILE SHEET (slide-up drawer)
    ═══════════════════════════════════════ */
    .mob-sheet-backdrop {
      display: none; position: fixed; inset: 0; z-index: 150;
      background: rgba(0,0,0,.55);
      -webkit-backdrop-filter: blur(3px); backdrop-filter: blur(3px);
    }
    .mob-sheet-backdrop.open { display: block; }

    .mob-sheet {
      position: fixed; left: 0; right: 0; bottom: 0;
      max-height: 74vh; z-index: 160;
      background: var(--card); border-top: 1px solid var(--border2);
      border-radius: 1.1rem 1.1rem 0 0;
      display: none; flex-direction: column;
      transform: translateY(100%);
      transition: transform .32s cubic-bezier(.2,0,.3,1);
      will-change: transform;
    }
    .mob-sheet.open { transform: none; }

    .mob-sheet-handle {
      width: 36px; height: 4px; border-radius: 2px;
      background: var(--border2); margin: .6rem auto .05rem; flex-shrink: 0;
    }
    .mob-sheet-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: .35rem 1rem .5rem; flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }
    .mob-sheet-title {
      font-size: .82rem; font-weight: 800; color: var(--text);
      letter-spacing: -.01em;
    }
    .mob-sheet-close {
      width: 28px; height: 28px; border-radius: 50%; border: none;
      background: rgba(255,255,255,.07); color: var(--muted);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .14s; flex-shrink: 0; font-family: inherit;
    }
    .mob-sheet-close:hover { background: rgba(255,255,255,.13); color: var(--text); }

    .mob-sheet-body {
      overflow-y: auto; flex: 1;
      overscroll-behavior: contain; padding-bottom: .5rem;
    }
    .mob-sheet-body::-webkit-scrollbar { display: none; }

    /* Category accordion inside sheet */
    .mob-scat-head {
      display: flex; align-items: center; gap: .5rem;
      padding: .88rem 1rem; border: none; background: transparent;
      width: 100%; font-family: inherit; text-align: left;
      cursor: pointer; transition: background .12s;
      min-height: 48px;
    }
    .mob-scat-head:hover { background: rgba(255,255,255,.03); }
    .mob-scat-head.open  { background: rgba(56,189,248,.04); }
    .mob-scat-name { flex: 1; font-size: .85rem; font-weight: 700; color: var(--text2); }
    .mob-scat-head.open .mob-scat-name { color: var(--text); }
    .mob-scat-count { font-size: .6rem; color: var(--muted); margin-right: .2rem; }
    .mob-scat-chevron { color: var(--border2); transition: transform .2s; flex-shrink: 0; }
    .mob-scat-head.open .mob-scat-chevron { transform: rotate(90deg); color: var(--accent); }
    .mob-scat-body { overflow: hidden; }

    /* Tier header inside sheet */
    .mob-tier-head {
      padding: .6rem 1rem .25rem; display: flex; align-items: center; gap: .4rem;
      font-size: .63rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: .1em; color: var(--accent);
    }
    .mob-tier-count { margin-left: auto; font-size: .6rem; color: var(--muted);
      font-weight: 600; text-transform: none; letter-spacing: 0; }

    /* Touch-friendlier rud-rows inside sheet */
    .mob-sheet-body .rud-row { padding: .82rem 1rem .82rem .85rem; min-height: 48px; }

    /* ═══════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════ */
    @media (max-width: 700px) {
      :root { --botbar: 58px; }

      .sidebar { display: none; }

      /* remove viewport-stretch on mobile — no dead space below card */
      .app-layout { min-height: 0; }

      /* full-width card, just enough room for bottom nav */
      .detail-area { padding: .9rem 1rem calc(var(--botbar) + .75rem); }

      /* BOTTOM NAV */
      .bottom-nav {
        display: flex; position: fixed; bottom: 0; left: 0; right: 0;
        height: var(--botbar); z-index: 180;
        background: var(--card); border-top: 1px solid var(--border2);
        align-items: stretch;
      }
      .bnav-tab {
        flex: 1; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: .15rem;
        border: none; background: transparent; font-family: inherit;
        cursor: pointer; color: var(--muted);
        transition: color .14s, background .14s; padding: .3rem .5rem;
      }
      .bnav-tab.active { color: var(--accent); background: rgba(56,189,248,.05); }
      .bnav-tab:hover:not(.active) { color: var(--text); }
      .bnav-icon  { font-size: 1.1rem; line-height: 1; }
      .bnav-label { font-size: .58rem; font-weight: 700; letter-spacing: .02em; }

      /* sheet bottom offset = bottom nav height */
      .mob-sheet { bottom: var(--botbar); }

      /* smaller card on mobile */
      .detail-card { border-radius: 1rem; }
      .dc-header { padding: 1.1rem 1.25rem .9rem; }
      .dc-name { font-size: 1.35rem; }
      .dc-section { padding: .9rem 1.25rem; }
      .fav-nav-row { padding: .7rem 1.25rem; }
      .sticking { font-size: 1.1rem; }

      .prog-pill.silver, .prog-pill.gold, .prog-pill.platinum { display: none; }
    }

    @media (max-width: 380px) {
      .prog-pill { display: none; }
    }
  </style>
</head>

<script>
const LEVELS=[
  {key:'bronze',  name:'Bronce',  bpm:60,  cls:'bronze'},
  {key:'silver',  name:'Plata',   bpm:80,  cls:'silver'},
  {key:'gold',    name:'Oro',     bpm:100, cls:'gold'},
  {key:'platinum',name:'Platino', bpm:130, cls:'platinum'},
  {key:'diamond', name:'Diamante',bpm:160, cls:'diamond'},
];
let rudProgress=JSON.parse(localStorage.getItem('rudProgress')||'{}');
function saveProgress(){localStorage.setItem('rudProgress',JSON.stringify(rudProgress));}
let rudFavs=new Set(JSON.parse(localStorage.getItem('rudFavs')||'[]'));
function saveFavs(){localStorage.setItem('rudFavs',JSON.stringify([...rudFavs]));}
function toggleFav(){
  if(!currentRud)return;
  if(rudFavs.has(currentRud.id))rudFavs.delete(currentRud.id);
  else rudFavs.add(currentRud.id);
  saveFavs();updateFavBtn();
  if(currentView==='favs'){buildFavsPanel();updateFavArrows();}
}
function updateFavBtn(){
  const btn=document.getElementById('favBtn');
  if(!btn||!currentRud)return;
  const on=rudFavs.has(currentRud.id);
  btn.textContent=on?'★':'☆';
  btn.classList.toggle('active',on);
  btn.title=on?'Quitar de favoritos':'Añadir a favoritos';
}
function updateFavArrows(){
  if(currentView!=='favs'){return;}
  const sorted=getFavsSorted();
  const ci=sorted.findIndex(r=>r.id===currentRud.id);
  const prev=document.getElementById('cardPrev');
  const next=document.getElementById('cardNext');
  const counter=document.getElementById('favCounter');
  if(prev)prev.disabled=(ci<=0);
  if(next)next.disabled=(ci<0||ci>=sorted.length-1);
  if(counter)counter.textContent=sorted.length?(ci+1)+'/'+sorted.length:'';
}
function navFav(dir){
  const sorted=getFavsSorted();
  const ci=sorted.findIndex(r=>r.id===currentRud.id);
  const target=sorted[ci+dir];
  if(!target)return;
  apFavsAutoPlay=!!(apAudio && !apAudio.paused);
  selectRud(target, dir);
}
function buildFavsPanel(){
  const el=document.getElementById('favsPanel');
  const favRuds=RUDIMENTS.filter(r=>rudFavs.has(r.id));
  if(!favRuds.length){
    el.innerHTML='<div class="favs-empty">Aún no tienes favoritos. Pulsa ☆ en cualquier rudimento para guardarlo aquí.</div>';
    return;
  }
  el.innerHTML='';
  const list=document.createElement('div');list.className='rud-list';
  favRuds.forEach(r=>list.appendChild(makeRudRow(r)));
  el.appendChild(list);
}
function buildFavStartRow(){
  const row=document.getElementById('favStartRow');
  if(!row)return;
  row.innerHTML='';
  const lbl=document.createElement('span');lbl.className='fav-start-label';lbl.textContent='Empezar desde:';
  row.appendChild(lbl);
  LEVELS.forEach(lvl=>{
    const btn=document.createElement('button');
    btn.className='fav-start-btn '+lvl.cls+(lvl.key===apFavsStartKey?' active':'');
    btn.textContent=lvl.name;
    btn.onclick=()=>{
      apFavsStartKey=lvl.key;
      row.querySelectorAll('.fav-start-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
    };
    row.appendChild(btn);
  });
}
function levelIndex(key){return key?LEVELS.findIndex(l=>l.key===key):-1;}
function levelColor(key){const l=LEVELS.find(l=>l.key===key);if(!l)return 'transparent';const map={bronze:'#c97c2e',silver:'#a8bac6',gold:'#ffc400',platinum:'#ffe566',diamond:'#00d4c0'};return map[l.key]||'transparent';}
function levelGlow(key){const map={bronze:'rgba(201,124,46,.6)',silver:'rgba(168,186,198,.55)',gold:'rgba(255,196,0,.75)',platinum:'rgba(255,229,102,.8)',diamond:'rgba(0,212,192,.85)'};return map[key]||'none';}
const levelIcons={bronze:'🥉',silver:'🥈',gold:'🥇',platinum:'🏆',diamond:'💎'};

const RR=(o={})=>({h:'R',...o});
const LL=(o={})=>({h:'L',...o});
const RA=(o={})=>({h:'R',a:true,...o});
const LA=(o={})=>({h:'L',a:true,...o});

const VF_IMG_BASE='img/';
const VF_IMG={
  1:'01_single-stroke-roll',
  2:'02_single-stroke-4',
  3:'03_single-stroke-7',
  4:'04_double-stroke-roll',
  5:'05_five-stroke-roll',
  6:'06_six-stroke-roll',
  7:'07_seven-stroke-roll',
  8:'08_eleven-stroke-roll',
  9:'09_nine-stroke-roll',
  10:'10_ten-stroke-roll',
  11:'11_thirteen-stroke-roll',
  12:'12_fifteen-stroke-roll',
  13:'13_seventeen-stroke-roll',
  14:'14_triple-stroke-roll',
  15:'15_multiple-bounce-roll',
  16:'16_single-paradiddle',
  17:'17_double-paradiddle',
  18:'18_triple-paradiddle',
  19:'19_paradiddle-diddle',
  20:'20_flam',
  21:'21_flam-accent',
  22:'22_flam-tap',
  23:'23_flamacue',
  24:'24_flam-paradiddle',
  25:'25_flammed-mill',
  26:'26_flam-paradiddle-diddle',
  27:'27_pataflafla',
  28:'28_swiss-army-triplet',
  29:'29_inverted-flam-tap',
  30:'30_flam-drag',
  31:'31_drag',
  32:'32_single-drag-tap',
  33:'33_double-drag-tap',
  34:'34_lesson-25',
  35:'35_single-dragadiddle',
  36:'36_drag-paradiddle1',
  37:'37_drag-paradiddle2',
  38:'38_single-ratamacue',
  39:'39_double-ratamacue',
  40:'40_triple-ratamacue',
};

const RUDIMENTS=[

function renderStaff(rud){
  const staffY=64, svgH=112, noteW=42, graceW=20, dragW=30, groupGap=22, lPad=38, rPad=38;
  const colR='#fb7185', colL='#60a5fa';
  const staffC='#3d5267';   // staff line / barlines / repeat dots
  const beamC ='#4a6070';   // note beams
  const barC  ='#2e4157';   // group separator barlines
  const nc    ='#b8c8d8';   // note head/stem/grace — solid, no alpha
  const ncG   ='#8fa8bf';   // grace/drag notes — slightly dimmer solid
  const slots=[]; let x=lPad;
  rud.pattern.forEach((group,gi)=>{
    group.forEach(note=>{
      if(note.g)x+=graceW;
      if(note.d)x+=dragW;
      slots.push({x,note,gi});
      x+=noteW;
    });
    x+=groupGap;
  });
  const totalW=x-groupGap+rPad+20;
  let s=`<svg width="${totalW}" height="${svgH}" xmlns="http://www.w3.org/2000/svg">`;
  s+=`<line x1="${lPad-14}" y1="${staffY}" x2="${totalW-rPad+14}" y2="${staffY}" stroke="${staffC}" stroke-width="1.5"/>`;
  s+=`<line x1="${lPad-14}" y1="${staffY-24}" x2="${lPad-14}" y2="${staffY+7}" stroke="${staffC}" stroke-width="1.5" stroke-linecap="round"/>`;
  s+=`<line x1="${lPad-7}"  y1="${staffY-24}" x2="${lPad-7}"  y2="${staffY+7}" stroke="${staffC}" stroke-width="5"   stroke-linecap="round"/>`;
  const ex=totalW-rPad+14;
  s+=`<line x1="${ex-7}" y1="${staffY-24}" x2="${ex-7}" y2="${staffY+7}" stroke="${staffC}" stroke-width="5"   stroke-linecap="round"/>`;
  s+=`<line x1="${ex-1}" y1="${staffY-24}" x2="${ex-1}" y2="${staffY+7}" stroke="${staffC}" stroke-width="1.5" stroke-linecap="round"/>`;
  s+=`<circle cx="${ex-13}" cy="${staffY-14}" r="3" fill="${staffC}"/>`;
  s+=`<circle cx="${ex-13}" cy="${staffY-5}"  r="3" fill="${staffC}"/>`;
  rud.pattern.forEach((group,gi)=>{
    if(group.length<2)return;
    const gs=slots.filter(sl=>sl.gi===gi);
    const bx1=gs[0].x+6, bx2=gs[gs.length-1].x+6, by=staffY-36;
    s+=`<rect x="${bx1}" y="${by}"   width="${bx2-bx1}" height="5" rx="2.5" fill="${beamC}"/>`;
    if(group.length>=4)
      s+=`<rect x="${bx1}" y="${by+9}" width="${bx2-bx1}" height="5" rx="2.5" fill="${beamC}"/>`;
    if(group.length===3)
      s+=`<rect x="${bx1}" y="${by+9}" width="${(bx2-bx1)*0.62}" height="5" rx="2.5" fill="${beamC}"/>`;
    if(group.length===3||group.length===6){
      const mid=(bx1+bx2)/2, ty=by-10, num=group.length, bw=Math.min((bx2-bx1)*0.28,14);
      s+=`<line x1="${mid-bw}" y1="${ty+5}" x2="${mid-bw}" y2="${ty-1}" stroke="${beamC}" stroke-width="1.2" stroke-linecap="round"/>`;
      s+=`<line x1="${mid-bw}" y1="${ty-1}" x2="${mid-6}"  y2="${ty-1}" stroke="${beamC}" stroke-width="1.2" stroke-linecap="round"/>`;
      s+=`<line x1="${mid+bw}" y1="${ty+5}" x2="${mid+bw}" y2="${ty-1}" stroke="${beamC}" stroke-width="1.2" stroke-linecap="round"/>`;
      s+=`<line x1="${mid+bw}" y1="${ty-1}" x2="${mid+6}"  y2="${ty-1}" stroke="${beamC}" stroke-width="1.2" stroke-linecap="round"/>`;
      s+=`<text x="${mid}" y="${ty+2}" text-anchor="middle" dominant-baseline="middle" fill="${beamC}" font-size="11" font-weight="700" font-family="Inter,sans-serif">${num}</text>`;
    }
  });
  rud.pattern.forEach((group,gi)=>{
    if(gi===0)return;
    const prev=slots.filter(sl=>sl.gi===gi-1).pop();
    const cur =slots.find(sl=>sl.gi===gi);
    if(!prev||!cur)return;
    const bx=(prev.x+cur.x)/2;
    s+=`<line x1="${bx}" y1="${staffY-22}" x2="${bx}" y2="${staffY+5}" stroke="${barC}" stroke-width="1" stroke-linecap="round"/>`;
  });
  slots.forEach(({x,note})=>{
    const col=note.h==='R'?colR:colL;   // colored R/L label
    if(note.d){
      [-dragW+5,-dragW+16].forEach((dx,di)=>{
        const gx=x+dx;
        s+=`<ellipse cx="${gx}" cy="${staffY}" rx="4" ry="3" fill="${ncG}" transform="rotate(-15 ${gx} ${staffY})"/>`;
        s+=`<line x1="${gx+3}" y1="${staffY-2}" x2="${gx+3.5}" y2="${staffY-19}" stroke="${ncG}" stroke-width="1.3"/>`;
        if(di===1)s+=`<line x1="${gx-3}" y1="${staffY-17}" x2="${gx+9}" y2="${staffY-10}" stroke="${ncG}" stroke-width="1.3"/>`;
      });
    }
    if(note.g){
      const gx=x-graceW+4;
      s+=`<ellipse cx="${gx}" cy="${staffY}" rx="4" ry="3" fill="${ncG}" transform="rotate(-15 ${gx} ${staffY})"/>`;
      s+=`<line x1="${gx+3}" y1="${staffY-2}" x2="${gx+3.5}" y2="${staffY-19}" stroke="${ncG}" stroke-width="1.3"/>`;
      s+=`<line x1="${gx-2}" y1="${staffY-17}" x2="${gx+8}"  y2="${staffY-10}" stroke="${ncG}" stroke-width="1.5"/>`;
      s+=`<line x1="${gx-1}" y1="${staffY-21}" x2="${gx+8}" y2="${staffY-10}" stroke="${ncG}" stroke-width="1.1"/>`;
    }
    s+=`<line x1="${x+6}" y1="${staffY-5}" x2="${x+6}" y2="${staffY-36}" stroke="${nc}" stroke-width="2" stroke-linecap="round"/>`;
    if(note.b)s+=`<text x="${x+11}" y="${staffY-22}" fill="${nc}" font-size="13" font-style="italic" font-family="Georgia,serif">z</text>`;
    s+=`<ellipse cx="${x}" cy="${staffY}" rx="8" ry="5.8" fill="${nc}" transform="rotate(-15 ${x} ${staffY})"/>`;
    if(note.a)s+=`<path d="M${x-7} ${staffY-50} L${x} ${staffY-43} L${x+7} ${staffY-50}" stroke="${nc}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>`;
    s+=`<text x="${x}" y="${staffY+23}" text-anchor="middle" fill="${col}" font-size="11.5" font-weight="700" font-family="Inter,sans-serif">${note.h}</text>`;
  });
  return s+'</svg>';
}
function renderSticking(rud){
  return rud.pattern.map((group,gi)=>{
    const part=group.map(note=>{
      let t='';
      if(note.d){const gc=note.d==='l'?'sL':'sR';t+=`<span class="${gc} sg">${note.d}${note.d}</span>`;}
      if(note.g){const gc=note.g==='l'?'sL':'sR';t+=`<span class="${gc} sg">${note.g}</span>`;}
      const cl=note.h==='R'?'sR':'sL';
      const acc=note.a?`<span style="font-size:.65rem;vertical-align:super">›</span>`:'';
      return t+`<span class="${cl}">${acc}${note.h}</span>`;
    }).join(' ');
    return (gi>0?`<span class="ssep">|</span>`:'')+part;
  }).join('');
}

/* ─── miniatura R/L del patrón ─── */
function patternNotes(rud){
  const notes=[];
  rud.pattern.forEach((group,gi)=>{
    if(gi>0)notes.push('sep');
    group.forEach(n=>notes.push(n.h));
    if(notes.length>10)return;
  });
  return notes.slice(0,14);
}
function renderMiniPattern(rud){
  const notes=patternNotes(rud);
  return notes.map(n=>n==='sep'
    ?`<span class="rud-row-sep"></span>`
    :`<span class="rud-row-note ${n}"></span>`
  ).join('');
}

/* ─── ACCORDION — category navigation ─── */
function buildCategAccordion(){
  const el=document.getElementById('categAccordion');if(!el)return;
  el.innerHTML='';
  categories.forEach(cat=>{
    const ruds=RUDIMENTS.filter(r=>r.cat===cat);
    const done=ruds.filter(r=>rudProgress[r.id]).length;
    const isOpen=cat===currentCat;
    const hasActive=ruds.some(r=>r===currentRud);
    const pct=ruds.length?Math.round(done/ruds.length*100):0;

    const section=document.createElement('div');
    section.className='acc-section';section.dataset.cat=cat;

    const head=document.createElement('button');
    head.className='acc-head'+(isOpen?' open':'')+(hasActive?' has-active':'');
    head.innerHTML=`<span class="acc-name">${cat}</span>
      <div class="acc-prog-wrap">
        <span class="acc-badge">${ruds.length}</span>
        <div class="acc-prog-bar"><div class="acc-prog-fill" style="width:${pct}%"></div></div>
      </div>
      <svg class="acc-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>`;

    const body=document.createElement('div');
    body.className='acc-body'+(isOpen?' open':'');
    const inner=document.createElement('div');inner.className='acc-body-inner rud-list';
    ruds.forEach(r=>inner.appendChild(makeRudRow(r)));
    body.appendChild(inner);

    head.onclick=()=>toggleAccSection(section,cat);
    section.appendChild(head);section.appendChild(body);
    el.appendChild(section);
  });
}
function toggleAccSection(section,cat){
  const body=section.querySelector('.acc-body');
  const head=section.querySelector('.acc-head');
  const opening=!body.classList.contains('open');
  // collapse all
  document.querySelectorAll('#categAccordion .acc-body').forEach(b=>b.classList.remove('open'));
  document.querySelectorAll('#categAccordion .acc-head').forEach(h=>h.classList.remove('open'));
  if(opening){
    body.classList.add('open');head.classList.add('open');
    currentCat=cat;
    const ruds=RUDIMENTS.filter(r=>r.cat===cat);
    if(ruds.length&&!ruds.includes(currentRud))selectRud(ruds[0]);
  }
}

function makeChip(rud){

        <span class="mob-scat-count">${ruds.length}</span>
        <svg class="mob-scat-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>`;
      const body=document.createElement('div');
      body.className='mob-scat-body';
      body.style.display=isOpen?'block':'none';
      const list=document.createElement('div');list.className='rud-list';
      ruds.forEach(r=>list.appendChild(makeMobRudRow(r)));
      body.appendChild(list);
      head.onclick=()=>{
        const wasOpen=body.style.display==='block';
        el.querySelectorAll('.mob-scat-body').forEach(b=>{b.style.display='none';});
        el.querySelectorAll('.mob-scat-head').forEach(h=>h.classList.remove('open'));
        if(!wasOpen){body.style.display='block';head.classList.add('open');mobOpenCat=cat;}
        else{mobOpenCat=null;}
      };
      sec.appendChild(head);sec.appendChild(body);el.appendChild(sec);
    });

  } else if(currentView==='tier'){
    [1,2,3,4].forEach(t=>{
      const ruds=RUDIMENTS.filter(r=>r.tier===t);
      const done=ruds.filter(r=>rudProgress[r.id]).length;
      const head=document.createElement('div');head.className='mob-tier-head';
      head.innerHTML=`${tierIcons[t]} Tier ${t} · ${tierNames[t]}<span class="mob-tier-count">${done}/${ruds.length}</span>`;
      const list=document.createElement('div');list.className='rud-list';
      list.style.padding='0 .5rem .4rem';
      ruds.forEach(r=>list.appendChild(makeMobRudRow(r)));
      el.appendChild(head);el.appendChild(list);
    });

  } else {
    const favRuds=RUDIMENTS.filter(r=>rudFavs.has(r.id));
    if(!favRuds.length){
      el.innerHTML='<div style="padding:2rem 1rem;font-size:.82rem;color:var(--muted);text-align:center;line-height:1.7">Sin favoritos aún.<br>Pulsa ☆ en un rudimento para guardarlo.</div>';
      return;
    }
    const list=document.createElement('div');list.className='rud-list';
    list.style.padding='.3rem .5rem';
    favRuds.forEach(r=>list.appendChild(makeMobRudRow(r)));
    el.appendChild(list);
  }
}

function makeMobRudRow(rud){
  const lvl=rudProgress[rud.id];
  const row=document.createElement('button');
  row.className='rud-row'+(rud===currentRud?' active':'');
  row.innerHTML=`<span class="rud-row-lvl" style="${lvl?'background:'+levelColor(lvl)+';border-color:'+levelColor(lvl)+';box-shadow:0 0 6px '+levelGlow(lvl):''}"></span>
    <span class="rud-row-name">${rud.name}</span>`;
  row.onclick=()=>{selectRud(rud);closeMobSheet();};
  return row;
}

let _sheetHideTimer=null;
function openMobSheet(){
  const s=document.getElementById('mobSheet');
  clearTimeout(_sheetHideTimer);
  s.style.display='flex';
  void s.offsetWidth; // force reflow so transition fires
  s.classList.add('open');
  document.getElementById('mobSheetBackdrop').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeMobSheet(){
  const s=document.getElementById('mobSheet');
  s.classList.remove('open');
  document.getElementById('mobSheetBackdrop').classList.remove('open');
  document.body.style.overflow='';
  mobOpenCat=null; // reset: next open starts with all sections collapsed
  clearTimeout(_sheetHideTimer);
  _sheetHideTimer=setTimeout(()=>{ if(!s.classList.contains('open'))s.style.display='none'; },350);
}
function mobNavClick(v){
  if(!isMobile()){setView(v);return;}
  const sheetOpen=document.getElementById('mobSheet').classList.contains('open');
  const sameView=v===currentView;
  setView(v);
  if(sheetOpen&&sameView){closeMobSheet();}
  else{mobOpenCat=null;buildMobSheet();openMobSheet();}
}

function setView(v){
  currentView=v;
  ['vtCateg','vtTier','vtFavs'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.classList.toggle('active',id==='vtCateg'&&v==='categ'||id==='vtTier'&&v==='tier'||id==='vtFavs'&&v==='favs');
  });
  ['bnavCateg','bnavTier','bnavFavs'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.classList.toggle('active',id==='bnavCateg'&&v==='categ'||id==='bnavTier'&&v==='tier'||id==='bnavFavs'&&v==='favs');
  });
  // build content before showing
  if(v==='tier')buildTierBlocks();
  else if(v==='favs'){buildFavsPanel();updateFavArrows();}
  else buildCategAccordion();
  // panel transition: instant hide, animated show
  const targets={categ:'categPanel',tier:'tierPanel',favs:'favsPanel'};
  ['categPanel','tierPanel','favsPanel'].forEach(pid=>{
    const el=document.getElementById(pid);if(!el)return;
    if(pid===targets[v]){
      el.style.display='';
      el.classList.remove('panel-enter');
      void el.offsetWidth;
      el.classList.add('panel-enter');
    } else {
      el.style.display='none';
      el.classList.remove('panel-enter');
    }
  });
  document.getElementById('appLayout').classList.toggle('view-favs',v==='favs');
  updateTabIndicator(v);
  buildMobList();
}
function updateTabIndicator(v){
  const ind=document.getElementById('sTabInd');if(!ind)return;
  const m={categ:'vtCateg',tier:'vtTier',favs:'vtFavs'};
  const tab=document.getElementById(m[v]);if(!tab)return;
  ind.style.left=tab.offsetLeft+'px';
  ind.style.width=tab.offsetWidth+'px';
}
function selectRud(rud, dir){
  const card=document.getElementById('detailCard');
  if(dir&&card){
    const outCls=dir>0?'rud-out':'rud-out-r', inCls=dir>0?'rud-in':'rud-in-r';
    card.classList.remove('rud-in','rud-in-r','rud-out','rud-out-r');
    card.classList.add(outCls);
    setTimeout(()=>{card.classList.remove(outCls);_applyRud(rud);void card.offsetWidth;card.classList.add(inCls);},190);
    return;
  }
  _applyRud(rud);
  if(isMobile())card.scrollIntoView({behavior:'smooth',block:'start'});
}
function _applyRud(rud){
  currentRud=rud;currentCat=rud.cat;
  document.getElementById('rudCatLabel').textContent=rud.cat;
  document.getElementById('rudName').textContent=rud.name;
  document.getElementById('rudTierBadge').textContent='Tier '+rud.tier;
  buildLevelStrip(rud);
  buildAudioPlayer(rud);
  updateFavBtn();
  const vfSlug=VF_IMG[rud.id];
  document.getElementById('staffWrap').innerHTML=vfSlug
    ?`<div class="vf-img-wrap"><img src="${VF_IMG_BASE}${vfSlug}.webp" alt="${rud.name}" loading="lazy"/></div>`
    :renderStaff(rud);
  if(currentView==='categ'){
    buildCategAccordion();
  } else if(currentView==='tier')buildTierBlocks();
  else{buildFavsPanel();updateFavArrows();}
  buildMobList();
  if(isMobile())closeMobSheet();
}
function buildLevelStrip(rud){
  const el=document.getElementById('levelStrip');el.innerHTML='';
  const ci=levelIndex(rudProgress[rud.id]);
  LEVELS.forEach((lvl,i)=>{
    const card=document.createElement('button');
    const reached=i<=ci;
    card.className=`ach-card ${lvl.cls}`+(reached?' reached':'');
    card.title=reached?`Logro conseguido — ${lvl.name} (${lvl.bpm} BPM)\nPulsa para desmarcar`:`Marcar logro ${lvl.name} (${lvl.bpm} BPM)`;
    card.innerHTML=`${reached?'<span class="ach-check">✓</span>':''}<span class="ach-icon">${levelIcons[lvl.key]}</span><span class="ach-name">${lvl.name}</span><span class="ach-bpm">${lvl.bpm} BPM</span>`;
    card.onclick=()=>{
      const wasReached=levelIndex(rudProgress[rud.id])>=i;
      rudProgress[rud.id]=rudProgress[rud.id]===lvl.key?null:lvl.key;
      if(!rudProgress[rud.id])delete rudProgress[rud.id];
      saveProgress();
      buildLevelStrip(rud);
      if(!wasReached){
        const newCard=el.children[i];
        if(newCard){newCard.classList.add('unlock-anim');newCard.addEventListener('animationend',()=>newCard.classList.remove('unlock-anim'),{once:true});}
      }
      refreshChips();updateProgBanner();
    };
    el.appendChild(card);
  });
}
function refreshChips(){
  if(currentView==='categ')buildCategAccordion();
  else if(currentView==='tier')buildTierBlocks();
  else buildFavsPanel();
  buildMobList();
}
function updateProgBanner(){
  const cum={bronze:0,silver:0,gold:0,platinum:0,diamond:0};
  RUDIMENTS.forEach(r=>{const li=levelIndex(rudProgress[r.id]);LEVELS.forEach((l,i)=>{if(li>=i)cum[l.key]++;});});
  document.getElementById('cBronze').textContent=cum.bronze;
  document.getElementById('cSilver').textContent=cum.silver;
  document.getElementById('cGold').textContent=cum.gold;
  document.getElementById('cPlat').textContent=cum.platinum;
  document.getElementById('cDiamond').textContent=cum.diamond;
  const total=40;
  document.getElementById('pbBronze').style.width=(cum.bronze/total*100)+'%';
  document.getElementById('pbSilver').style.width=(cum.silver/total*100)+'%';
  document.getElementById('pbGold').style.width=(cum.gold/total*100)+'%';
  document.getElementById('pbPlat').style.width=(cum.platinum/total*100)+'%';
  document.getElementById('pbDiamond').style.width=(cum.diamond/total*100)+'%';
}
const VF_BASE='https://ae.vicfirth.com/wp-content/uploads/';
const VF_STEMS={
  1:'01_Single-Stroke-Roll-',2:'02_Single-Stroke-4_',3:'03_Single-Stroke-7_',
  14:'05_Triple-Stroke-Roll_',4:'06_Double-Stroke-Roll_',5:'07_Five-Stroke-Roll_',
  6:'08_Six-Stroke-Roll_',7:'09_Seven-Stroke-Roll-',9:'10_Nine-Stroke-Roll_',
  10:'11_Ten-Stroke-Roll_',8:'12_Eleven-Stroke-Roll_',11:'13_Thirteen-Stroke-Roll_',
  12:'14_Fifteen-Stroke-Roll_',13:'15_Seventeen-Stroke-Roll_',16:'16_Single-Paradiddle_',
  17:'17_Double-Paradiddle_',18:'18_Triple-Paradiddle_',19:'19_Paradiddle-diddle_',
  20:'20_Flam_',21:'21_Flam-Accent_',22:'22_Flam-Tap_',23:'23_Flamacue_',
  24:'24_Flam-Paradiddle_',25:'25_Flammed-Mill_',26:'26_Flam-Paradiddle-diddle_',
  27:'27_Patafla-fla_',28:'28_Swiss-Army-Triplet_',29:'29_Inverted-Flam-Tap_',
  30:'30_Flam-Drag_',32:'32_Single-Drag-Tap_',33:'33_Double-Drag-Tap_',
  34:'34_Lesson-25_',35:'35_Single-Dragadiddle_',36:'36_Drag-Paradiddle-1_',
  37:'37_Drag-Paradiddle-2_',38:'38_Single-Ratamacue_',39:'39_Double-Ratamacue_',
  40:'40_Triple-Ratamacue_',
};
const AP_TRACKS=[
  {key:'open-close-open',label:'O-C-O'},{key:'bronze',label:'Bronce'},
  {key:'silver',label:'Plata'},{key:'gold',label:'Oro'},
  {key:'platinum',label:'Platino'},{key:'diamond',label:'Diamante'},
];
let apAudio=null, apCurrentKey='open-close-open', apStem=null, apFavsAutoPlay=false, apFavsStartKey='bronze';
function getFavsSorted(){return RUDIMENTS.filter(r=>rudFavs.has(r.id)).sort((a,b)=>a.tier-b.tier||a.id-b.id);}
function buildAudioPlayer(rud){
  const el=document.getElementById('audioPlayer');
  const sec=document.getElementById('audioSection');
  const stem=VF_STEMS[rud.id]||null;
  apStem=stem;
  if(apAudio){apAudio.pause();apAudio.src='';}
  sec.style.display='';
  if(!stem){el.innerHTML='<div class="ap-unavail">Audio no disponible para este rudimento.</div>';return;}
  apCurrentKey=apFavsAutoPlay?apFavsStartKey:'open-close-open';
  const btns=AP_TRACKS.map(t=>`<button class="ap-track${t.key===apCurrentKey?' active':''}" data-key="${t.key}">${t.label}</button>`).join('');
  el.innerHTML=`<div class="ap-tracks">${btns}</div>
    <div class="ap-controls">
      <button class="ap-play" id="apPlay">&#9654;</button>
      <div class="ap-progress-wrap" id="apProgressWrap"><div class="ap-progress-fill" id="apProgressFill"></div></div>
      <span class="ap-time" id="apTime">-:--</span>
    </div>`;
  apAudio=new Audio();apAudio.preload='none';apAudio.src=VF_BASE+apStem+apCurrentKey+'.mp3';
  el.querySelectorAll('.ap-track').forEach(btn=>{btn.onclick=()=>apSelectTrack(btn.dataset.key);});
  document.getElementById('apPlay').onclick=apToggle;
  document.getElementById('apProgressWrap').onclick=e=>{
    if(!apAudio||!apAudio.duration)return;
    const r=e.currentTarget.getBoundingClientRect();
    apAudio.currentTime=((e.clientX-r.left)/r.width)*apAudio.duration;
  };
  apAudio.addEventListener('timeupdate',apUpdateProgress);
  apAudio.addEventListener('ended',()=>{
    const idx=AP_TRACKS.findIndex(t=>t.key===apCurrentKey);
    if(idx>=0&&idx<AP_TRACKS.length-1){apSelectTrack(AP_TRACKS[idx+1].key);apAudio.play().catch(()=>{});}
    else if(currentView==='favs'){
      const sorted=getFavsSorted().filter(r=>VF_STEMS[r.id]);
      const ci=sorted.findIndex(r=>r.id===currentRud.id);
      if(ci>=0&&ci<sorted.length-1){apFavsAutoPlay=true;selectRud(sorted[ci+1],1);}
      else apSetPlay(false);
    }else apSetPlay(false);
  });
  apAudio.addEventListener('play',()=>apSetPlay(true));
  apAudio.addEventListener('pause',()=>apSetPlay(false));
  if(apFavsAutoPlay){apFavsAutoPlay=false;setTimeout(()=>apAudio.play().catch(()=>{}),80);}
}
function apSelectTrack(key){
  const wasPlaying=apAudio&&!apAudio.paused;
  if(apAudio)apAudio.pause();
  apCurrentKey=key;apAudio.src=VF_BASE+apStem+key+'.mp3';
  document.querySelectorAll('#audioPlayer .ap-track').forEach(b=>b.classList.toggle('active',b.dataset.key===key));
  apSetPlay(false);apResetBar();
  if(wasPlaying)apAudio.play().catch(()=>{});
}
function apToggle(){if(!apAudio)return;if(apAudio.paused)apAudio.play().catch(()=>{});else apAudio.pause();}
function apSetPlay(on){const btn=document.getElementById('apPlay');if(!btn)return;btn.innerHTML=on?'&#9646;&#9646;':'&#9654;';btn.classList.toggle('playing',on);}
function apResetBar(){const f=document.getElementById('apProgressFill'),t=document.getElementById('apTime');if(f)f.style.width='0%';if(t)t.textContent='-:--';}
function apUpdateProgress(){
  if(!apAudio)return;
  const f=document.getElementById('apProgressFill'),t=document.getElementById('apTime');
  if(!f||!t)return;
  f.style.width=(apAudio.duration?(apAudio.currentTime/apAudio.duration)*100:0)+'%';
  const rem=apAudio.duration?apAudio.duration-apAudio.currentTime:0;
  t.textContent=`${Math.floor(rem/60)}:${String(Math.floor(rem%60)).padStart(2,'0')}`;
}

buildCategAccordion();selectRud(RUDIMENTS[0]);updateProgBanner();buildFavStartRow();buildMobList();
updateTabIndicator('categ');
window.addEventListener('resize',()=>updateTabIndicator(currentView));
document.getElementById('favBtn').onclick=toggleFav;
</script>
<script>
(function(){
  requestAnimationFrame(function(){requestAnimationFrame(function(){document.body.classList.add('loaded');});});
  document.querySelectorAll('a[href]').forEach(function(a){
    a.addEventListener('click',function(e){
      var href=this.getAttribute('href');
      if(!href||href.startsWith('#')||this.target)return;
      try{if(new URL(href,location.href).origin!==location.origin)return;}catch(_){return;}
      e.preventDefault();document.body.classList.add('exit');
      setTimeout(function(){location.href=href;},280);
    });
  });
})();
</script>
</body>
