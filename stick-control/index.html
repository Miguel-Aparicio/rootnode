<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stick Control — Práctica</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
<nav>
  <a href="/">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Inicio
  </a>
  <span class="sep">/</span>
  <span class="title">Stick Control</span>
</nav>

<div class="app">
  <h1 class="page-title">Stick Control</h1>
  <p class="page-subtitle">G. L. Stone — Páginas 1, 2 y 3 · 72 ejercicios · Verifica los patrones con tu libro</p>

  <p class="progress-label"><span class="done-count" id="doneCount">0</span> / <span id="totalCount">0</span> ejercicios practicados</p>
  <div class="progress-bar-row">
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div class="section-tabs" id="sectionTabs"></div>
  <div class="pattern-chips" id="patternChips"></div>

  <div class="card-nav">
    <div class="practice-card" id="practiceCard">
      <div class="card-inner">
        <div class="pattern-header">
          <div class="pattern-ex" id="patternEx"></div>
          <button class="done-btn" id="doneBtn" title="Marcar como practicado" onclick="toggleDone()">✓</button>
        </div>
        <div class="beat-display" id="beatDisplay"></div>
        <div class="controls">
          <div class="play-row">
            <button class="play-btn" id="playBtn" onclick="togglePlay()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            </button>
            <div class="metronome-info">
              <div class="loop-counter">Vuelta: <span class="loop-count" id="loopCount">0</span></div>
              <div class="beat-counter" id="beatCounterLabel">Pulso: — / 8</div>
            </div>
            <div class="right-controls">
              <div class="bpm-trigger-wrap">
                <button class="bpm-trigger" id="modeTrigger" onclick="toggleModeDropdown(event)">
                  <span id="modeDisplay">Modo</span>
                </button>
                <div class="bpm-dropdown" id="modeDropdown">
                  <button class="mode-opt" data-mode="reps20" onclick="setMode('reps20')">20 repeticiones</button>
                  <button class="mode-opt" data-mode="wait2" onclick="setMode('wait2')">Espera 2 compases</button>
                  <button class="mode-opt" data-mode="wait4" onclick="setMode('wait4')">Espera 4 compases</button>
                </div>
              </div>
              <div class="bpm-trigger-wrap">
                <button class="bpm-trigger" id="bpmTrigger" onclick="toggleBpmDropdown(event)">
                  <span id="bpmDisplay">80</span><span class="bpm-unit"> BPM</span>
                </button>
                <div class="bpm-dropdown" id="bpmDropdown">
                  <input type="range" id="bpmSlider" min="30" max="220" value="80" oninput="setBpm(+this.value)">
                  <div class="tempo-presets" id="tempoPresets"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="js/app.js" defer></script>
</body>
</html>
