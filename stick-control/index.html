<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stick Control — Práctica</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
<nav>
  <a href="/">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Inicio
  </a>
  <span class="sep">/</span>
  <span class="title">Stick Control</span>
</nav>

<div class="app">
  <h1 class="page-title">Stick Control</h1>
  <p class="page-subtitle">Por George Lawrence Stone</p>

  <div class="view-toggle" id="viewToggle">
    <button class="view-toggle-btn active" data-view="practica" onclick="setViewMode('practica')">Práctica</button>
    <button class="view-toggle-btn" data-view="biblioteca" onclick="setViewMode('biblioteca')">Biblioteca</button>
  </div>

  <div class="page-picker" id="pagePicker"></div>

  <div class="card-nav">
    <div class="practice-card" id="practiceCard">
      <div class="card-inner">
        <div class="pattern-header">
          <div class="pattern-ex" id="patternEx"></div>

        </div>
        <div class="controls">
          <div class="play-row">
            <button class="play-btn" id="playBtn" onclick="togglePlay()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            </button>
            <div class="metronome-info">
              <div class="loop-counter" id="modeCounter"></div>
              <svg class="wait-ring" id="waitRing" viewBox="0 0 36 36" width="36" height="36">
                <circle class="wait-ring-bg" cx="18" cy="18" r="15"/>
                <circle class="wait-ring-fill" id="waitRingFill" cx="18" cy="18" r="15"/>
              </svg>
            </div>
            <button class="repeat-btn" id="repeatBtn" onclick="requestRepeat()">&#x21A9; Repetir</button>
            <div class="right-controls">
              <div id="modeControls">
                <span class="mode-label">Modos:</span>
                <div class="bpm-trigger-wrap">
                  <button class="bpm-trigger" id="modeTrigger" onclick="toggleModeDropdown(event)">
                    <span id="modeDisplay">Modo</span>
                  </button>
                  <div class="bpm-dropdown" id="modeDropdown">
                    <button class="mode-opt" data-mode="reps20" onclick="setMode('reps20')">20 repeticiones</button>
                    <button class="mode-opt" data-mode="wait2" onclick="setMode('wait2')">Espera 2 compases</button>
                    <button class="mode-opt" data-mode="wait4" onclick="setMode('wait4')">Espera 4 compases</button>
                  </div>
                </div>
              </div>
              <div class="bpm-trigger-wrap">
                <button class="bpm-trigger" id="bpmTrigger" onclick="toggleBpmDropdown(event)">
                  <span id="bpmDisplay">152</span><span class="bpm-unit"> BPM</span>
                </button>
                <div class="bpm-dropdown" id="bpmDropdown">
                  <input type="range" id="bpmSlider" min="30" max="220" value="152" oninput="setBpm(+this.value)">
                  <div class="tempo-presets" id="tempoPresets"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="exercises-stack" id="exercisesStack">
          <div class="beat-display" id="beatDisplay"></div>
          <div class="beat-display" id="beatDisplayNext"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="library-panel" id="libraryPanel"></div>
</div>

<script src="js/app.js" defer></script>
</body>
</html>
