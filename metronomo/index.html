<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tiki &mdash; migueguay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="nav"><a href="/">&#8592; Inicio</a></div>
  <div class="card">
    <div class="card-top">
      <h1>Tiki</h1>
      <button class="gear-btn" id="gear-btn" title="Ajustes">
        <svg class="icon-gear" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        <svg class="icon-back" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
      </button>
    </div>

    <!-- ── Vista de ajustes ── -->
    <div id="settings-view">
      <div class="settings-section">
        <div class="settings-section-label">Sonido del metrónomo</div>
        <div id="sound-picker" class="sound-picker">
          <button class="sound-picker-btn" id="sound-picker-btn" type="button">
            <span class="sound-picker-icon" id="sound-picker-icon"></span>
            <span class="sound-picker-label" id="sound-picker-label"></span>
            <svg class="sound-picker-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="sound-dropdown" id="sound-dropdown"></div>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-section-label">Apariencia</div>
        <div class="theme-row">
          <span class="theme-row-label">
            <span class="theme-icon" id="theme-icon">🌙</span>
            <span id="theme-label">Modo oscuro</span>
          </span>
          <label class="toggle">
            <input type="checkbox" id="theme-toggle" />
            <span class="toggle-track"></span>
            <span class="toggle-thumb"></span>
          </label>
        </div>
      </div>
    </div>

    <!-- ── Vista principal del metrónomo ── -->
    <div id="metro-view">

      <div class="section" style="padding-top:0; border-top:none;">
        <div class="pendulum-wrap" id="pendulum-wrap">
          <button class="play-btn" id="btn-start" title="Iniciar">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,2 20,12 5,22"/></svg>
          </button>
          <div class="pendulum-line" id="pendulum"></div>
        </div>
        <div class="beats" id="beats" style="margin-top:1.25rem;"></div>
      </div>

      <div class="section">
        <div class="bpm-wrap">
          <div class="bpm-row">
            <button class="bpm-btn" id="btn-minus">&#8722;</button>
            <div class="bpm-center">
              <div class="bpm-number" id="bpm-display" contenteditable="true" spellcheck="false">120</div>
              <div class="bpm-unit">BPM</div>
            </div>
            <button class="bpm-btn" id="btn-plus">+</button>
          </div>
          <div class="slider-wrap" style="margin-top:1.25rem;">
            <input type="range" id="bpm-slider" min="5" max="300" value="120" />
            <div class="slider-limits"><span>5</span><span>300</span></div>
          </div>
          <div style="margin-top:0.85rem; display:flex; justify-content:center;">
            <button class="btn-tap" id="btn-tap">TAP</button>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-label">Compás</div>
        <div class="ts-wrap">
          <div class="ts-display" id="ts-display">
            <div class="ts-col">
              <button class="ts-arrow" id="num-up">&#9650;</button>
              <span class="ts-number" id="ts-num">4</span>
              <button class="ts-arrow" id="num-down">&#9660;</button>
            </div>
            <div class="ts-slash">/</div>
            <div class="ts-col">
              <button class="ts-arrow" id="den-up">&#9650;</button>
              <span class="ts-number" id="ts-den">4</span>
              <button class="ts-arrow" id="den-down">&#9660;</button>
            </div>
          </div>
          <button class="ts-libre-btn" id="ts-libre">Libre</button>
        </div>
      </div>

      <div class="section">
        <div class="section-label">Figura</div>
        <div class="note-sel" id="note-sel">

          <button class="note-btn" data-sub="0.25">
            <svg width="18" height="24" viewBox="0 0 28 36">
              <ellipse cx="14" cy="26" rx="9" ry="6" fill="none" stroke="currentColor" stroke-width="2"/>
            </svg>
            <span class="nname">Redonda</span>
            <span class="nsub">cada 4 tiempos</span>
          </button>

          <button class="note-btn" data-sub="0.5">
            <svg width="18" height="24" viewBox="0 0 28 36">
              <ellipse cx="14" cy="28" rx="8" ry="5.5" fill="none" stroke="currentColor" stroke-width="2"/>
              <line x1="22" y1="28" x2="22" y2="4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span class="nname">Blanca</span>
            <span class="nsub">cada 2 tiempos</span>
          </button>

          <button class="note-btn active" data-sub="1">
            <svg width="18" height="24" viewBox="0 0 28 36">
              <ellipse cx="13" cy="28" rx="8" ry="5.5" fill="currentColor" transform="rotate(-15 13 28)"/>
              <line x1="21" y1="26" x2="21" y2="4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span class="nname">Negra</span>
            <span class="nsub">1 tiempo</span>
          </button>

          <button class="note-btn" data-sub="2">
            <svg width="18" height="24" viewBox="0 0 28 36">
              <ellipse cx="12" cy="28" rx="8" ry="5.5" fill="currentColor" transform="rotate(-15 12 28)"/>
              <line x1="20" y1="26" x2="20" y2="4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M20 4 C28 8, 26 16, 20 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span class="nname">Corchea</span>
            <span class="nsub">÷ 2</span>
          </button>

          <button class="note-btn" data-sub="4">
            <svg width="18" height="24" viewBox="0 0 28 36">
              <ellipse cx="12" cy="28" rx="8" ry="5.5" fill="currentColor" transform="rotate(-15 12 28)"/>
              <line x1="20" y1="26" x2="20" y2="4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M20 4 C28 8, 26 14, 20 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M20 10 C28 14, 26 20, 20 22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span class="nname">Semicorchea</span>
            <span class="nsub">÷ 4</span>
          </button>

          <button class="note-btn" data-sub="3">
            <svg width="18" height="24" viewBox="0 0 28 36">
              <ellipse cx="12" cy="28" rx="8" ry="5.5" fill="currentColor" transform="rotate(-15 12 28)"/>
              <line x1="20" y1="26" x2="20" y2="4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M20 4 C28 8, 26 16, 20 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <text x="23" y="10" font-size="9" font-weight="bold" fill="currentColor" font-family="sans-serif">3</text>
            </svg>
            <span class="nname">Tresillo</span>
            <span class="nsub">÷ 3</span>
          </button>

          <button class="note-btn" id="btn-random" data-sub="random">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="16 3 21 3 21 8"/>
              <line x1="4" y1="20" x2="21" y2="3"/>
              <polyline points="21 16 21 21 16 21"/>
              <line x1="15" y1="15" x2="21" y2="21"/>
            </svg>
            <span class="nname">Random</span>
            <span class="nsub">aleatorio</span>
          </button>

        </div>
      </div>

      <div class="section">
        <div class="timer-header">
          <div class="section-label" style="margin-bottom:0;">Temporizador</div>
          <label class="toggle">
            <input type="checkbox" id="timer-toggle" />
            <span class="toggle-track"></span>
            <span class="toggle-thumb"></span>
          </label>
        </div>
        <div class="timer-body" id="timer-body">
          <div class="timer-presets">
            <button class="preset-btn" data-s="300">5 min</button>
            <button class="preset-btn" data-s="600">10 min</button>
            <button class="preset-btn" data-s="900">15 min</button>
            <button class="preset-btn" data-s="1800">30 min</button>
            <button class="preset-btn" data-s="3600">1 h</button>
            <button class="preset-btn" data-s="5400">1 h 30</button>
            <button class="preset-btn" data-s="7200">2 h</button>
          </div>
          <div class="timer-fields">
            <div class="timer-field">
              <div class="field-spin">
                <button class="spin-btn" data-field="hr" data-dir="1">&#9650;</button>
                <input class="field-val" id="timer-hr" type="number" value="0" min="0" max="23" />
                <button class="spin-btn" data-field="hr" data-dir="-1">&#9660;</button>
              </div>
              <label>h</label>
            </div>
            <span class="timer-sep">:</span>
            <div class="timer-field">
              <div class="field-spin">
                <button class="spin-btn" data-field="min" data-dir="1">&#9650;</button>
                <input class="field-val" id="timer-min" type="number" value="5" min="0" max="59" />
                <button class="spin-btn" data-field="min" data-dir="-1">&#9660;</button>
              </div>
              <label>min</label>
            </div>
            <span class="timer-sep">:</span>
            <div class="timer-field">
              <div class="field-spin">
                <button class="spin-btn" data-field="sec" data-dir="1">&#9650;</button>
                <input class="field-val" id="timer-sec" type="number" value="0" min="0" max="59" />
                <button class="spin-btn" data-field="sec" data-dir="-1">&#9660;</button>
              </div>
              <label>seg</label>
            </div>
          </div>
          <div class="timer-countdown" id="timer-countdown">00:05:00</div>
          <div class="timer-progress"><div class="timer-progress-bar" id="timer-bar"></div></div>
        </div>
      </div>

    </div><!-- /#metro-view -->

  </div><!-- /.card -->

  <script type="module" src="js/app.js"></script>
</body>
</html>
